<header class="site-header">
  <div class="site-header__inner">
    <p class="eyebrow">{{ site.eyebrow | default: "Documentation" }}</p>
    <div class="site-brand">
      <div>
        <h1 class="site-brand__title"><a href="{{ '/' | relative_url }}">{{ site.brand_title | default: site.title }}</a></h1>
        <p class="site-brand__tagline">{{ site.brand_tagline | default: site.description }}</p>
      </div>
    </div>
    <nav class="site-header__actions" aria-label="Project links">
      <a href="{{ '/start.html' | relative_url }}"{% if page.path == 'start.md' %} aria-current="page"{% endif %}><kbd>Start Here</kbd></a>
      <a href="{{ '/reference/' | relative_url }}"{% if page.path contains 'reference/' %} aria-current="page"{% endif %}><kbd>Reference</kbd></a>
      <a href="{{ site.repo_url }}"><kbd>Source</kbd></a>
      <a href="{{ site.galaxy_url }}"><kbd>Ansible Galaxy</kbd></a>
    </nav>
  </div>
</header>
