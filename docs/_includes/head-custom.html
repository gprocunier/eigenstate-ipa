<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  rel="icon"
  href="{{ '/favicon.ico' | relative_url }}"
  type="image/x-icon"
/>
<link
  rel="shortcut icon"
  href="{{ '/favicon.ico' | relative_url }}"
  type="image/x-icon"
/>
<link
  href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700&family=Red+Hat+Mono:wght@400;500&family=Red+Hat+Text:wght@400;500;700&display=swap"
  rel="stylesheet"
/>

<style>
  :root {
    --rh-red: #ee0000;
    --rh-red-dark: #a30000;
    --rh-red-light: #fce3e3;
    --rh-gray-10: #f5f5f5;
    --rh-gray-20: #e0e0e0;
    --rh-gray-30: #c7c7c7;
    --rh-gray-70: #6a6e73;
    --rh-gray-80: #4d4d4d;
    --rh-gray-90: #151515;
    --rh-link: #0066cc;
    --rh-max-width: 1136px;
    --rh-body-width: 789px;
  }

  html {
    font-size: 16px;
    scroll-behavior: smooth;
  }

  body {
    background: #ffffff;
    color: var(--rh-gray-90);
    font-family: "Red Hat Text", Helvetica, Arial, sans-serif;
  }

  a {
    color: var(--rh-link);
    text-decoration: underline;
    text-underline-offset: 0.12em;
  }

  .container-lg {
    max-width: var(--rh-max-width) !important;
    padding-right: 2rem !important;
    padding-left: 2rem !important;
  }

  .markdown-body {
    max-width: var(--rh-body-width);
    margin: 0 auto;
    color: var(--rh-gray-90);
    background: #ffffff;
    font-family: "Red Hat Text", Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }

  .markdown-body h1,
  .markdown-body h2,
  .markdown-body h3,
  .markdown-body h4,
  .markdown-body h5,
  .markdown-body h6 {
    font-family: "Red Hat Display", "Red Hat Text", Helvetica, Arial, sans-serif;
    color: var(--rh-gray-90);
    font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 1.3;
  }

  .markdown-body h1 {
    margin-top: 0;
    margin-bottom: 1.25rem;
    padding-top: 1.75rem;
    border-top: 4px solid var(--rh-red);
    border-bottom: 0;
    font-size: clamp(2.25rem, 5vw, 4rem);
    line-height: 1.08;
  }

  .markdown-body h2 {
    margin-top: 2.5rem;
    margin-bottom: 1rem;
    padding-bottom: 0;
    border-bottom: 0;
    color: var(--rh-red);
    font-size: clamp(1.65rem, 3vw, 2.35rem);
  }

  .markdown-body h3 {
    margin-top: 2rem;
    font-size: 1.3rem;
  }

  .markdown-body p,
  .markdown-body li,
  .markdown-body td,
  .markdown-body th {
    font-size: 1rem;
    line-height: 1.5;
  }

  .markdown-body ul,
  .markdown-body ol {
    padding-left: 1.25rem;
  }

  .markdown-body hr {
    height: 1px;
    margin: 2rem 0;
    background: var(--rh-gray-20);
    border: 0;
  }

  .markdown-body table {
    display: table;
    width: 100%;
    border-collapse: collapse;
  }

  .markdown-body table th,
  .markdown-body table td {
    border: 1px solid var(--rh-gray-20);
    padding: 0.75rem 0.9rem;
  }

  .markdown-body table th {
    background: var(--rh-gray-10);
    font-weight: 700;
    text-align: left;
  }

  .markdown-body code,
  .markdown-body pre,
  .markdown-body tt {
    font-family: "Red Hat Mono", Consolas, monospace;
  }

  .markdown-body code {
    background: var(--rh-gray-10);
    border: 1px solid var(--rh-gray-20);
    border-radius: 0;
    padding: 0.08rem 0.28rem;
  }

  .markdown-body pre {
    padding: 1rem;
    overflow: auto;
    border: 1px solid var(--rh-gray-20);
    border-radius: 0;
    background: var(--rh-gray-10);
  }

  .markdown-body pre code {
    background: transparent;
    border: 0;
    padding: 0;
  }

  .markdown-body blockquote {
    margin: 1.25rem 0;
    padding: 0.75rem 1rem;
    color: var(--rh-gray-80);
    border-left: 0.35rem solid var(--rh-gray-30);
  }

  blockquote.admonition {
    border-left-width: 0.35rem;
    border-left-style: solid;
    border-radius: 0;
    margin: 1.25rem 0;
    padding: 0.85rem 1rem;
  }

  blockquote.admonition p {
    margin: 0.35rem 0;
  }

  blockquote.admonition .admonition-title {
    font-weight: 700;
    margin-bottom: 0.4rem;
  }

  blockquote.admonition-note,
  blockquote.admonition-tip {
    background: var(--rh-gray-10);
    border-left-color: var(--rh-link);
  }

  blockquote.admonition-important {
    background: #fff4e5;
    border-left-color: #f56a00;
  }

  blockquote.admonition-warning,
  blockquote.admonition-caution {
    background: var(--rh-red-light);
    border-left-color: var(--rh-red);
  }

  .markdown-body a kbd,
  .markdown-body kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 2.5rem;
    margin: 0.2rem 0.35rem 0.2rem 0;
    padding: 0.45rem 0.85rem;
    color: var(--rh-gray-90);
    background: #ffffff;
    border: 1px solid var(--rh-gray-80);
    border-radius: 0;
    box-shadow: none;
    font-family: "Red Hat Text", Helvetica, Arial, sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    letter-spacing: 0;
    white-space: normal;
  }

  .markdown-body a kbd:hover,
  .markdown-body a kbd:focus {
    color: #ffffff;
    background: var(--rh-red);
    border-color: var(--rh-red);
  }

  .markdown-body .mermaid {
    max-width: 100%;
    margin: 1.5rem 0;
    overflow-x: auto;
    border: 1px solid var(--rh-gray-20);
    background: #ffffff;
    padding: 0.85rem;
  }

  .markdown-body .mermaid svg {
    display: block;
    max-width: 100%;
    height: auto;
  }

  @media (max-width: 768px) {
    .container-lg {
      padding-right: 1rem !important;
      padding-left: 1rem !important;
    }

    .markdown-body {
      max-width: 100%;
    }

    .markdown-body h1 {
      padding-top: 1.25rem;
    }
  }
</style>

<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

  const renderMermaid = async () => {
    const blocks = document.querySelectorAll("pre > code.language-mermaid");
    if (!blocks.length) {
      return;
    }

    blocks.forEach((code) => {
      const pre = code.parentElement;
      const container = document.createElement("div");
      container.className = "mermaid";
      container.textContent = code.textContent;
      pre.replaceWith(container);
    });

    mermaid.initialize({
      startOnLoad: false,
      securityLevel: "loose",
      theme: "base",
      flowchart: {
        curve: "linear",
        htmlLabels: true
      },
      themeVariables: {
        primaryColor: "#ffffff",
        primaryTextColor: "#151515",
        primaryBorderColor: "#c7c7c7",
        lineColor: "#4d4d4d",
        secondaryColor: "#f2f2f2",
        secondaryTextColor: "#151515",
        secondaryBorderColor: "#c7c7c7",
        tertiaryColor: "#fce3e3",
        tertiaryTextColor: "#151515",
        tertiaryBorderColor: "#ee0000",
        background: "#ffffff",
        mainBkg: "#ffffff",
        clusterBkg: "#ffffff",
        clusterBorder: "#c7c7c7",
        actorBkg: "#ffffff",
        actorBorder: "#c7c7c7",
        actorTextColor: "#151515",
        labelBoxBkgColor: "#ffffff",
        labelTextColor: "#151515",
        edgeLabelBackground: "#ffffff",
        signalColor: "#4d4d4d",
        signalTextColor: "#151515",
        noteBkgColor: "#f2f2f2",
        noteBorderColor: "#c7c7c7",
        noteTextColor: "#151515",
        sequenceNumberColor: "#151515",
        fontFamily: "Red Hat Text"
      },
      themeCSS: `
        .node rect,
        .node polygon,
        .node path,
        .node circle {
          stroke-width: 1.5px;
        }
        .nodeLabel,
        .label foreignObject div,
        .edgeLabel {
          font-family: 'Red Hat Text', Helvetica, Arial, sans-serif !important;
          color: #151515 !important;
        }
        .cluster-label text,
        .cluster-label span {
          font-family: 'Red Hat Text', Helvetica, Arial, sans-serif !important;
          font-weight: 500;
          color: #151515 !important;
        }
        .edgePath .path,
        .flowchart-link {
          stroke: #4d4d4d !important;
          stroke-width: 1.5px !important;
          stroke-linecap: square;
        }
        .marker path {
          fill: #4d4d4d !important;
          stroke: #4d4d4d !important;
        }
        .actor {
          stroke-width: 1.5px !important;
        }
      `
    });

    await mermaid.run({
      querySelector: ".mermaid",
    });
  };

  const renderAdmonitions = () => {
    document.querySelectorAll("blockquote").forEach((blockquote) => {
      const firstParagraph = blockquote.querySelector("p");
      if (!firstParagraph) {
        return;
      }

      const marker = firstParagraph.textContent.match(/^\s*\[!(IMPORTANT|NOTE|TIP|WARNING|CAUTION)\]\s*/);
      if (!marker) {
        return;
      }

      const kind = marker[1].toLowerCase();
      firstParagraph.innerHTML = firstParagraph.innerHTML.replace(/^\s*\[![A-Z]+\]\s*/, "");

      const title = document.createElement("p");
      title.className = "admonition-title";
      title.textContent = marker[1].charAt(0) + marker[1].slice(1).toLowerCase();

      blockquote.classList.add("admonition", "admonition-" + kind);
      blockquote.insertBefore(title, firstParagraph);
    });
  };

  window.addEventListener("DOMContentLoaded", async () => {
    renderAdmonitions();
    await renderMermaid();
  });
</script>
