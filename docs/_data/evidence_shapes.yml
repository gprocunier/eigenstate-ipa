ansible-doc:
  label: ansible-doc output
  statement: Plugin or module documentation generated from source documentation blocks.
command-output:
  label: Command output
  statement: Terminal output from a documented command, with sensitive fields redacted.
inventory-output:
  label: Inventory output
  statement: Ansible inventory graph or hostvars derived from IdM state.
review-manifest:
  label: Review manifest
  statement: A rendered Kubernetes or OpenShift manifest with payload values omitted or redacted.
payload-manifest:
  label: Payload manifest
  statement: An opt-in payload-bearing artifact that must use restrictive handling and must not be copied into docs.
json-report:
  label: JSON report
  statement: Machine-readable evidence emitted by a report role or playbook.
yaml-report:
  label: YAML report
  statement: Reviewable structured evidence emitted by a report role or playbook.
markdown-report:
  label: Markdown report
  statement: Human-readable evidence emitted by a report role or playbook.
architecture-boundary:
  label: Architecture boundary
  statement: A documented responsibility split between IdM, Ansible, AAP, cluster runtimes, certificate authorities, Kerberos tooling, and reports.
