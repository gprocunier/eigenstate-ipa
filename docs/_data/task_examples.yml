---
use-idm-as-live-inventory:
  heading: Example Inventory Source
  intro: >-
    This inventory source reads host and policy state from IdM, composes the
    Ansible connection address from the IdM FQDN, and creates reviewable groups
    from IdM attributes.
  files:
    - name: inventory.eigenstate_ipa.yml
      code: |
        ---
        plugin: eigenstate.ipa.idm

        # The control node or execution environment must reach this IdM API.
        server: idm-01.example.com

        # Kerberos is preferred for scheduled jobs because no password is stored
        # in the inventory source. In AAP, mount this keytab as a credential.
        use_kerberos: true
        ipaadmin_principal: automation
        kerberos_keytab: /runner/env/ipa/automation.keytab
        verify: /etc/ipa/ca.crt

        # Keep the first sync narrow. Add sources only when a job needs them.
        sources:
          - hosts
          - hostgroups
          - hbacrules

        # Limit the inventory to the hostgroups that this automation owns.
        hostgroup_filter:
          - linux-app
          - linux-db
        host_filter_from_groups: true

        # Expose a stable connection variable and create useful groups.
        compose:
          ansible_host: idm_fqdn
        keyed_groups:
          - key: idm_location
            prefix: location
            separator: "_"
          - key: idm_os
            prefix: os
            separator: "_"
  run: |
    ansible-inventory -i inventory.eigenstate_ipa.yml --graph
    ansible-inventory -i inventory.eigenstate_ipa.yml --host app01.example.com

query-principal-state:
  heading: Example Principal Preflight
  intro: >-
    This playbook checks that the service principal exists and already has key
    material before a workflow retrieves a keytab or requests a certificate.
  files:
    - name: preflight-principal.yml
      code: |
        ---
        - name: Verify service principal readiness
          hosts: localhost
          gather_facts: false
          vars:
            ipa_server: idm-01.example.com
            ipa_keytab: /runner/env/ipa/automation.keytab
            service_principal: HTTP/app01.example.com@EXAMPLE.COM
          tasks:
            - name: Read principal state from IdM
              ansible.builtin.set_fact:
                principal_state: >-
                  {{ lookup('eigenstate.ipa.principal',
                            service_principal,
                            server=ipa_server,
                            kerberos_keytab=ipa_keytab,
                            result_format='record') }}

            - name: Stop before any downstream workflow if IdM is not ready
              ansible.builtin.assert:
                that:
                  - principal_state.exists
                  - principal_state.has_keytab
                fail_msg: >-
                  {{ service_principal }} must exist and have key material
                  before keytab retrieval or certificate issuance runs.
  run: |
    ansible-playbook preflight-principal.yml

retrieve-idm-vault-secret:
  heading: Example Secret Retrieval
  intro: >-
    This playbook retrieves a shared IdM vault value into memory, keeps task
    output redacted, and uses the value without writing it to disk.
  files:
    - name: retrieve-vault-secret.yml
      code: |
        ---
        - name: Retrieve one IdM vault value for a job
          hosts: localhost
          gather_facts: false
          vars:
            ipa_server: idm-01.example.com
            ipa_keytab: /runner/env/ipa/automation.keytab
          tasks:
            - name: Read database password from a shared IdM vault
              ansible.builtin.set_fact:
                database_password: >-
                  {{ lookup('eigenstate.ipa.vault',
                            'database-password',
                            server=ipa_server,
                            kerberos_keytab=ipa_keytab,
                            shared=true) }}
              no_log: true

            - name: Use the value in a protected task
              ansible.builtin.debug:
                msg: "Database password was retrieved for this job."
              no_log: true
  run: |
    ansible-playbook retrieve-vault-secret.yml

manage-idm-vault-lifecycle:
  heading: Example Vault Lifecycle Playbook
  intro: >-
    This playbook creates a shared vault if needed, archives a new value, and
    keeps secret-bearing tasks redacted.
  files:
    - name: manage-vault.yml
      code: |
        ---
        - name: Create and archive a shared IdM vault value
          hosts: localhost
          gather_facts: false
          vars:
            ipa_server: idm-01.example.com
            ipa_keytab: /runner/env/ipa/automation.keytab
            new_database_password: "{{ lookup('env', 'NEW_DATABASE_PASSWORD') }}"
          tasks:
            - name: Ensure the shared vault exists
              eigenstate.ipa.vault_write:
                name: database-password
                state: present
                shared: true
                description: Password consumed by database maintenance jobs.
                server: "{{ ipa_server }}"
                kerberos_keytab: "{{ ipa_keytab }}"

            - name: Archive the rotated value
              eigenstate.ipa.vault_write:
                name: database-password
                state: archived
                shared: true
                data: "{{ new_database_password }}"
                server: "{{ ipa_server }}"
                kerberos_keytab: "{{ ipa_keytab }}"
              no_log: true
  run: |
    export NEW_DATABASE_PASSWORD="$(secret-tool lookup app database-password)"
    ansible-playbook manage-vault.yml

retrieve-keytab:
  heading: Example Keytab Retrieval
  intro: >-
    This playbook retrieves an existing keytab without rotating the principal
    and writes it with restrictive file permissions.
  files:
    - name: retrieve-keytab.yml
      code: |
        ---
        - name: Retrieve an existing service keytab
          hosts: app_servers
          become: true
          gather_facts: false
          tasks:
            - name: Retrieve and install the existing HTTP keytab
              eigenstate.ipa.keytab_manage:
                principal: "HTTP/{{ inventory_hostname }}@EXAMPLE.COM"
                state: retrieved
                destination: /etc/httpd/conf/httpd.keytab
                mode: "0600"
                owner: apache
                group: apache
                server: idm-01.example.com
                kerberos_keytab: /runner/env/ipa/automation.keytab
                verify: /etc/ipa/ca.crt
              no_log: true
  run: |
    ansible-playbook -i inventory.eigenstate_ipa.yml retrieve-keytab.yml

rotate-keytab-explicitly:
  heading: Example Explicit Rotation
  intro: >-
    This playbook rotates a keytab only after both the module state and the
    confirmation guard make the destructive operation explicit.
  files:
    - name: rotate-keytab.yml
      code: |
        ---
        - name: Rotate a service keytab with an explicit guard
          hosts: app_servers
          become: true
          gather_facts: false
          serial: 1
          tasks:
            - name: Rotate and install the HTTP keytab
              eigenstate.ipa.keytab_manage:
                principal: "HTTP/{{ inventory_hostname }}@EXAMPLE.COM"
                state: rotated
                confirm_rotation: true
                destination: /etc/httpd/conf/httpd.keytab
                mode: "0600"
                owner: apache
                group: apache
                server: idm-01.example.com
                kerberos_keytab: /runner/env/ipa/automation.keytab
                verify: /etc/ipa/ca.crt
              no_log: true

            - name: Restart the service after the keytab changes
              ansible.builtin.service:
                name: httpd
                state: restarted
  run: |
    ansible-playbook -i inventory.eigenstate_ipa.yml rotate-keytab.yml

request-idm-certificate:
  heading: Example Certificate Request
  intro: >-
    This playbook sends an existing CSR to IdM and writes only the issued
    certificate; private key generation stays outside the module.
  files:
    - name: request-certificate.yml
      code: |
        ---
        - name: Request a service certificate from IdM
          hosts: app_servers
          become: true
          gather_facts: false
          tasks:
            - name: Submit CSR and install returned certificate
              eigenstate.ipa.cert_request:
                principal: "HTTP/{{ inventory_hostname }}@EXAMPLE.COM"
                csr_file: /etc/pki/tls/private/app.csr
                destination: /etc/pki/tls/certs/app.pem
                mode: "0644"
                server: idm-01.example.com
                kerberos_keytab: /runner/env/ipa/automation.keytab
                verify: /etc/ipa/ca.crt
  run: |
    ansible-playbook -i inventory.eigenstate_ipa.yml request-certificate.yml

issue-otp-or-host-enrollment-password:
  heading: Example Host Enrollment Password
  intro: >-
    This playbook generates a host enrollment password, redacts it, and passes
    it directly to the enrollment role.
  files:
    - name: enroll-host.yml
      code: |
        ---
        - name: Issue a host enrollment password and enroll the host
          hosts: new_idm_clients
          gather_facts: false
          tasks:
            - name: Generate one enrollment password for this host
              ansible.builtin.set_fact:
                enroll_password: >-
                  {{ lookup('eigenstate.ipa.otp',
                            inventory_hostname,
                            token_type='host',
                            server='idm-01.example.com',
                            kerberos_keytab='/runner/env/ipa/automation.keytab') }}
              delegate_to: localhost
              no_log: true

            - name: Enroll the host with ansible-freeipa
              ansible.builtin.include_role:
                name: freeipa.ansible_freeipa.ipaclient
              vars:
                ipaclient_hostname: "{{ inventory_hostname }}"
                ipaclient_password: "{{ enroll_password }}"
              no_log: true
  run: |
    ansible-playbook -i new-hosts.yml enroll-host.yml

inspect-dns-state:
  heading: Example DNS Inspection
  intro: >-
    This playbook reads IdM DNS records and fails early when the expected
    address is not present.
  files:
    - name: inspect-dns.yml
      code: |
        ---
        - name: Inspect IdM DNS state before deployment
          hosts: localhost
          gather_facts: false
          vars:
            expected_ip: 192.0.2.25
          tasks:
            - name: Read the app DNS record
              ansible.builtin.set_fact:
                app_dns: >-
                  {{ lookup('eigenstate.ipa.dns',
                            'app01',
                            zone='example.com',
                            server='idm-01.example.com',
                            kerberos_keytab='/runner/env/ipa/automation.keytab') }}

            - name: Require the DNS record before continuing
              ansible.builtin.assert:
                that:
                  - expected_ip in app_dns.arecord
                fail_msg: "app01.example.com does not point at {{ expected_ip }}."
  run: |
    ansible-playbook inspect-dns.yml

test-hbac-access:
  heading: Example HBAC Gate
  intro: This playbook uses IdM HBAC test output as a preflight gate before deployment tasks run.
  files:
    - name: test-hbac.yml
      code: |
        ---
        - name: Verify automation account HBAC access
          hosts: app_servers
          gather_facts: false
          tasks:
            - name: Test whether automation can use sshd on the target
              ansible.builtin.set_fact:
                access: >-
                  {{ lookup('eigenstate.ipa.hbacrule',
                            'automation-svc',
                            operation='test',
                            targethost=inventory_hostname,
                            service='sshd',
                            server='idm-01.example.com',
                            kerberos_keytab='/runner/env/ipa/automation.keytab') }}
              delegate_to: localhost

            - name: Stop if HBAC would deny the automation account
              ansible.builtin.assert:
                that:
                  - not access.denied
                fail_msg: "HBAC denied automation-svc on {{ inventory_hostname }}."
  run: |
    ansible-playbook -i inventory.eigenstate_ipa.yml test-hbac.yml

inspect-sudo-policy:
  heading: Example Sudo Policy Check
  intro: >-
    This playbook reads a sudo rule and asserts that the command expected by the
    deployment is represented in IdM.
  files:
    - name: inspect-sudo.yml
      code: |
        ---
        - name: Inspect sudo policy before relying on it
          hosts: localhost
          gather_facts: false
          tasks:
            - name: Read the maintenance sudo rule
              ansible.builtin.set_fact:
                sudo_rule: >-
                  {{ lookup('eigenstate.ipa.sudo',
                            'ops-maintenance',
                            sudo_object='rule',
                            server='idm-01.example.com',
                            kerberos_keytab='/runner/env/ipa/automation.keytab') }}

            - name: Require systemctl access in the rule
              ansible.builtin.assert:
                that:
                  - "'/usr/bin/systemctl' in sudo_rule.commands"
                fail_msg: "ops-maintenance does not allow systemctl."
  run: |
    ansible-playbook inspect-sudo.yml

inspect-selinux-map-scope:
  heading: Example SELinux Map Check
  intro: >-
    This playbook confirms that a named SELinux user map exists, is enabled, and
    is scoped through the expected HBAC rule.
  files:
    - name: inspect-selinux-map.yml
      code: |
        ---
        - name: Inspect SELinux user map scope
          hosts: localhost
          gather_facts: false
          tasks:
            - name: Read SELinux map state
              ansible.builtin.set_fact:
                map_state: >-
                  {{ lookup('eigenstate.ipa.selinuxmap',
                            'ops-deploy-map',
                            server='idm-01.example.com',
                            kerberos_keytab='/runner/env/ipa/automation.keytab') }}

            - name: Require enabled HBAC-scoped confinement
              ansible.builtin.assert:
                that:
                  - map_state.exists
                  - map_state.enabled
                  - map_state.hbacrule == 'ops-deploy'
                fail_msg: "ops-deploy-map is missing, disabled, or not scoped by ops-deploy."
  run: |
    ansible-playbook inspect-selinux-map.yml

open-temporary-access-window:
  heading: Example Temporary Access Window
  intro: >-
    This playbook opens a two-hour access window only after HBAC preflight
    checks pass, then renders a metadata-only report.
  files:
    - name: temporary-access-window.yml
      code: |
        ---
        - name: Open a governed temporary access window
          hosts: localhost
          gather_facts: false
          tasks:
            - name: Open the access window through the packaged role
              ansible.builtin.import_role:
                name: eigenstate.ipa.temporary_access_window
              vars:
                eigenstate_taw_state: open
                eigenstate_taw_username: contractor01
                eigenstate_taw_server: idm-01.example.com
                eigenstate_taw_kerberos_keytab: /runner/env/ipa/automation.keytab
                eigenstate_taw_hbac_targethost: bastion01.example.com
                eigenstate_taw_hbac_service: sshd
                eigenstate_taw_principal_expiration: "02:00"
                eigenstate_taw_password_expiration_matches_principal: true
                eigenstate_taw_report_dir: ./artifacts
  run: |
    ansible-playbook temporary-access-window.yml

render-kubernetes-secret-from-idm-vault:
  heading: Example Review Manifest
  intro: >-
    This vars file drives the packaged wrapper playbook. It retrieves vault
    material only when live lookup is enabled and renders a redacted Kubernetes
    Secret review manifest by default.
  files:
    - name: render-vault-secret-vars.yml
      code: |
        ---
        eigenstate_k8s_secret_name: app-config
        eigenstate_k8s_secret_namespace: payments
        eigenstate_k8s_secret_output_dir: ./artifacts
        eigenstate_k8s_secret_render_only: true
        eigenstate_k8s_secret_apply: false
        eigenstate_k8s_secret_render_review_manifest: true
        eigenstate_k8s_secret_write_payload_manifest: false
        eigenstate_k8s_secret_live_lookup_enabled: true
        eigenstate_k8s_secret_vault_name: app-config
        eigenstate_k8s_secret_vault_scope: shared
        eigenstate_k8s_secret_server: idm-01.example.com
        eigenstate_k8s_secret_kerberos_keytab: /runner/env/ipa/automation.keytab
  run: |
    ansible-playbook playbooks/render-kubernetes-secret-from-idm-vault.yml \
      -e @render-vault-secret-vars.yml

render-kubernetes-tls-from-idm-cert:
  heading: Example TLS Secret Rendering
  intro: >-
    This vars file renders a redacted TLS Secret manifest from certificate
    material that was already issued and reviewed.
  files:
    - name: render-tls-secret-vars.yml
      code: |
        ---
        eigenstate_k8s_tls_secret_name: app-tls
        eigenstate_k8s_tls_namespace: payments
        eigenstate_k8s_tls_certificate: "{{ lookup('file', 'artifacts/app.pem') }}"
        eigenstate_k8s_tls_private_key: "{{ lookup('file', 'private/app.key') }}"
        eigenstate_k8s_tls_output_dir: ./artifacts
        eigenstate_k8s_tls_render_only: true
        eigenstate_k8s_tls_apply: false
        eigenstate_k8s_tls_render_review_manifest: true
        eigenstate_k8s_tls_write_payload_manifest: false
  run: |
    ansible-playbook playbooks/render-kubernetes-tls-secret-from-idm-cert.yml \
      -e @render-tls-secret-vars.yml

render-keytab-secret:
  heading: Example Keytab Secret Rendering
  intro: >-
    This vars file renders a redacted Kubernetes Secret manifest for an already
    retrieved keytab.
  files:
    - name: render-keytab-secret-vars.yml
      code: |
        ---
        eigenstate_keytab_secret_name: app-http-keytab
        eigenstate_keytab_secret_namespace: payments
        eigenstate_keytab_secret_principal: HTTP/app01.example.com@EXAMPLE.COM
        eigenstate_keytab_secret_keytab_b64: "{{ lookup('file', 'artifacts/http.keytab.b64') }}"
        eigenstate_keytab_secret_output_dir: ./artifacts
        eigenstate_keytab_secret_render_only: true
        eigenstate_keytab_secret_apply: false
        eigenstate_keytab_secret_render_review_manifest: true
        eigenstate_keytab_secret_write_payload_manifest: false
  run: |
    ansible-playbook playbooks/render-keytab-secret.yml -e @render-keytab-secret-vars.yml

render-openshift-identity-evidence:
  heading: Example OpenShift Identity Evidence
  intro: >-
    This vars file renders OAuth/OIDC configuration and a readiness report from
    local evidence; it does not contact the cluster.
  files:
    - name: render-openshift-identity-vars.yml
      code: |
        ---
        eigenstate_oidc_issuer_url: https://keycloak.example.com/realms/openshift
        eigenstate_oidc_client_id: openshift
        eigenstate_oidc_client_secret_name: openid-client-secret
        eigenstate_oidc_expected_groups:
          - ocp-platform-admins
          - ocp-developers
        eigenstate_oidc_idm_known_groups:
          - ocp-platform-admins
          - ocp-developers
        eigenstate_oidc_output_dir: ./artifacts
        eigenstate_oidc_render_config: true
        eigenstate_oidc_render_report: true
  run: |
    ansible-playbook playbooks/render-openshift-oidc-config.yml \
      -e @render-openshift-identity-vars.yml

build-disconnected-aap-ee:
  heading: Example Execution Environment Build
  intro: >-
    This vars file renders and builds an execution environment that contains the
    collection and the IdM client dependencies needed by AAP jobs.
  files:
    - name: aap-ee-build-vars.yml
      code: |
        ---
        eigenstate_ee_render: true
        eigenstate_ee_build: true
        eigenstate_ee_smoke: true
        eigenstate_ee_push: false
        eigenstate_ee_register_controller: false
        eigenstate_ee_output_dir: ./build/eigenstate-idm-ee
        eigenstate_ee_image: localhost/eigenstate-idm-ee:dev
        eigenstate_ee_base_image: registry.example.com/aap/ee-minimal-rhel9:latest
        eigenstate_ee_collection_version: ">=1.18.1"
  run: |
    ansible-playbook playbooks/aap-ee-build.yml -e @aap-ee-build-vars.yml

generate-operational-evidence:
  heading: Example Evidence Report
  intro: >-
    This vars file renders a deterministic readiness report from explicit check
    records supplied by inventory, surveys, or an earlier discovery job.
  files:
    - name: readiness-report-vars.yml
      code: |
        ---
        eigenstate_idm_readiness_report_site: prod-idm
        eigenstate_idm_readiness_report_output_dir: ./artifacts
        eigenstate_idm_readiness_report_checks:
          - id: kerberos-auth
            title: Kerberos authentication path
            status: pass
            severity: high
            evidence: AAP has a mounted automation keytab credential.
            recommendation: Keep keytab rotation under normal control.
          - id: idm-api
            title: IdM API reachability
            status: pass
            severity: high
            evidence: Controller execution nodes can reach idm-01.example.com.
            recommendation: Monitor API reachability from the EE subnet.
  run: |
    ansible-playbook playbooks/report-idm-readiness.yml -e @readiness-report-vars.yml

migrate-side-effecting-lookups:
  heading: Example Migration
  intro: >-
    This example moves a keytab rotation out of a lookup and into an explicit
    module task with a visible rotation guard.
  files:
    - name: before.yml
      code: |
        ---
        - name: Old pattern hides rotation inside a lookup expression
          ansible.builtin.copy:
            content: >-
              {{ lookup('eigenstate.ipa.keytab',
                        principal,
                        retrieve_mode='generate') | b64decode }}
            dest: /etc/httpd/conf/httpd.keytab
          no_log: true
    - name: after.yml
      code: |
        ---
        - name: New pattern makes the mutating operation explicit
          eigenstate.ipa.keytab_manage:
            principal: "{{ principal }}"
            state: rotated
            confirm_rotation: true
            destination: /etc/httpd/conf/httpd.keytab
            mode: "0600"
            server: idm-01.example.com
            kerberos_keytab: /runner/env/ipa/automation.keytab
          no_log: true

first-idm-inventory:
  heading: Example Tutorial Files
  intro: >-
    Start with a narrow inventory source, inspect the graph, then target the
    generated group in a simple playbook.
  files:
    - name: inventory.eigenstate_ipa.yml
      code: |
        ---
        plugin: eigenstate.ipa.idm

        # This must be the IdM API endpoint reachable from the control node or
        # execution environment.
        server: idm-01.example.com

        # Kerberos keeps the inventory file free of password material. Run
        # kinit before using this tutorial, or provide kerberos_keytab for a
        # non-interactive execution environment.
        ipaadmin_principal: automation
        use_kerberos: true
        verify: /etc/ipa/ca.crt

        # Keep the first inventory sync narrow. This example uses an HBAC rule
        # as the source of target scope because the same policy can govern SSH
        # access and automation placement.
        sources:
          - hosts
          - hbacrules
        hbacrule_filter:
          - allow-ssh-app

        # Dropping the prefix makes the generated group name match the policy
        # name after Ansible-safe normalization: allow-ssh-app -> allow_ssh_app.
        hbacrule_prefix: ""
        host_filter_from_groups: true

        # The playbook below connects to the FQDN returned by IdM.
        compose:
          ansible_host: idm_fqdn
    - name: list-hosts.yml
      code: |
        ---
        - name: Show hosts discovered from live IdM inventory
          hosts: allow_ssh_app
          gather_facts: false
          tasks:
            - name: Confirm the host came from live IdM inventory
              ansible.builtin.debug:
                msg: "{{ inventory_hostname }} resolves to {{ ansible_host }}"
  run: |
    ansible-inventory -i inventory.eigenstate_ipa.yml --graph
    ansible-playbook -i inventory.eigenstate_ipa.yml list-hosts.yml

first-vault-retrieval:
  heading: Example Tutorial Playbook
  intro: >-
    Retrieve one shared vault value, keep it redacted, and prove the workflow
    without printing the secret.
  files:
    - name: first-vault-retrieval.yml
      code: |
        ---
        - name: Retrieve one IdM vault value safely
          hosts: localhost
          gather_facts: false
          tasks:
            - name: Read a shared vault value into memory
              ansible.builtin.set_fact:
                app_secret: >-
                  {{ lookup('eigenstate.ipa.vault',
                            'app-bootstrap',
                            server='idm-01.example.com',
                            kerberos_keytab='/runner/env/ipa/automation.keytab',
                            shared=true) }}
              no_log: true

            - name: Report only that retrieval succeeded
              ansible.builtin.debug:
                msg: "Retrieved app-bootstrap from IdM vault for this job."
  run: |
    ansible-playbook first-vault-retrieval.yml

build-aap-execution-environment:
  heading: Example Tutorial Playbook
  intro: >-
    Render the execution environment context first, then build and smoke-test it
    when the rendered files look correct.
  files:
    - name: build-ee.yml
      code: |
        ---
        - name: Build the eigenstate.ipa IdM execution environment
          hosts: localhost
          gather_facts: false
          roles:
            - role: eigenstate.ipa.aap_execution_environment
              vars:
                eigenstate_ee_output_dir: ./build/eigenstate-idm-ee
                eigenstate_ee_image: localhost/eigenstate-idm-ee:tutorial
                eigenstate_ee_render: true
                eigenstate_ee_build: true
                eigenstate_ee_smoke: true
                eigenstate_ee_push: false
  run: |
    ansible-playbook build-ee.yml

service-onboarding-with-principal-keytab-cert:
  heading: Example Onboarding Playbook
  intro: >-
    This sequence preflights the principal, retrieves the keytab, and requests
    the certificate without mixing the private key into IdM.
  files:
    - name: onboard-service.yml
      code: |
        ---
        - name: Onboard an HTTP service through IdM-backed checks
          hosts: app_servers
          become: true
          gather_facts: false
          vars:
            service_principal: "HTTP/{{ inventory_hostname }}@EXAMPLE.COM"
          tasks:
            - name: Confirm the service principal exists
              ansible.builtin.assert:
                that:
                  - principal_state.exists
                vars:
                  principal_state: >-
                    {{ lookup('eigenstate.ipa.principal',
                              service_principal,
                              server='idm-01.example.com',
                              kerberos_keytab='/runner/env/ipa/automation.keytab') }}

            - name: Retrieve the existing service keytab
              eigenstate.ipa.keytab_manage:
                principal: "{{ service_principal }}"
                state: retrieved
                destination: /etc/httpd/conf/httpd.keytab
                mode: "0600"
                owner: apache
                group: apache
                server: idm-01.example.com
                kerberos_keytab: /runner/env/ipa/automation.keytab
              no_log: true

            - name: Request certificate from an existing CSR
              eigenstate.ipa.cert_request:
                principal: "{{ service_principal }}"
                csr_file: /etc/pki/tls/private/app.csr
                destination: /etc/pki/tls/certs/app.pem
                server: idm-01.example.com
                kerberos_keytab: /runner/env/ipa/automation.keytab
  run: |
    ansible-playbook -i inventory.eigenstate_ipa.yml onboard-service.yml

render-workload-secret:
  heading: Example Tutorial Playbook
  intro: >-
    Render a review manifest first, inspect it, and only enable payload or apply
    behavior in a separate approved step.
  files:
    - name: render-workload-secret.yml
      code: |
        ---
        - name: Render a review-only workload Secret
          hosts: localhost
          gather_facts: false
          roles:
            - role: eigenstate.ipa.kubernetes_secret_from_idm_vault
              vars:
                eigenstate_k8s_secret_name: app-config
                eigenstate_k8s_secret_namespace: tutorial
                eigenstate_k8s_secret_vault_name: app-config
                eigenstate_k8s_secret_vault_shared: true
                eigenstate_k8s_secret_server: idm-01.example.com
                eigenstate_k8s_secret_kerberos_keytab: /runner/env/ipa/automation.keytab
                eigenstate_k8s_secret_output_dir: ./artifacts
                eigenstate_k8s_secret_render_only: true
                eigenstate_k8s_secret_apply: false
                eigenstate_k8s_secret_write_payload_manifest: false
  run: |
    ansible-playbook render-workload-secret.yml

temporary-access-window:
  heading: Example Tutorial Playbook
  intro: >-
    Open a short access window, then run the same playbook with `expire` to
    close it immediately when work is done.
  files:
    - name: temporary-access.yml
      code: |
        ---
        - name: Manage a temporary IdM user lease
          hosts: localhost
          gather_facts: false
          vars:
            access_state: open
          roles:
            - role: eigenstate.ipa.temporary_access_window
              vars:
                eigenstate_taw_state: "{{ access_state }}"
                eigenstate_taw_username: contractor01
                eigenstate_taw_server: idm-01.example.com
                eigenstate_taw_kerberos_keytab: /runner/env/ipa/automation.keytab
                eigenstate_taw_hbac_targethost: bastion01.example.com
                eigenstate_taw_hbac_service: sshd
                eigenstate_taw_principal_expiration: "02:00"
                eigenstate_taw_password_expiration_matches_principal: true
                eigenstate_taw_report_dir: ./artifacts
  run: |
    ansible-playbook temporary-access.yml
    ansible-playbook temporary-access.yml -e access_state=expire

readiness-report:
  heading: Example Tutorial Playbook
  intro: >-
    Build a small readiness report from explicit facts so the output is
    deterministic and reviewable.
  files:
    - name: readiness-report.yml
      code: |
        ---
        - name: Generate a tutorial readiness report
          hosts: localhost
          gather_facts: false
          roles:
            - role: eigenstate.ipa.idm_readiness_report
              vars:
                eigenstate_idm_readiness_report_site: tutorial
                eigenstate_idm_readiness_report_output_dir: ./artifacts
                eigenstate_idm_readiness_report_checks:
                  - id: kerberos-auth
                    title: Kerberos authentication path
                    status: pass
                    severity: high
                    evidence: Tutorial keytab path is configured.
                    recommendation: Replace tutorial inputs with site credentials.
  run: |
    ansible-playbook readiness-report.yml
