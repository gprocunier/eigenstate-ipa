<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google-site-verification" content="-cAcLaA0l0O_JyCuMrNDwKoISaFm8JtOsfjnvXLGgA4">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    {% seo %}
    <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" type="image/x-icon">
    <link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700&family=Red+Hat+Mono:wght@400;500&family=Red+Hat+Text:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
    <script type="module" src="{{ '/assets/site.js' | relative_url }}"></script>
  </head>
  <body data-baseurl="{{ site.baseurl | default: '' }}">
    <div class="site-shell">
      {% include header.html %}
      <main class="page-shell{% if page.wide %} page-shell--wide{% endif %}">
        {% include sidebar.html %}
        <article class="content-column markdown-body">
          {% include breadcrumbs.html %}
          {% include diataxis_badge.html %}
          {{ content }}
        </article>
      </main>
      {% include footer.html %}
    </div>
  </body>
</html>
