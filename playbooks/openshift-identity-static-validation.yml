---
- name: Validate OpenShift identity roles without live services
  hosts: localhost
  gather_facts: false
  check_mode: true
  tasks:
    - name: Validate OpenShift OIDC rendering and local evidence
      ansible.builtin.import_role:
        name: eigenstate.ipa.openshift_idm_oidc_validation
      vars:
        eigenstate_oidc_output_dir: "{{ playbook_dir }}/../build/openshift-identity-static"
      tags: oidc

    - name: Validate Keycloak IdM federation evidence
      ansible.builtin.import_role:
        name: eigenstate.ipa.keycloak_idm_federation_validation
      vars:
        eigenstate_keycloak_output_dir: "{{ playbook_dir }}/../build/openshift-identity-static"
      tags: keycloak

    - name: Validate OpenShift breakglass evidence
      ansible.builtin.import_role:
        name: eigenstate.ipa.openshift_breakglass_validation
      vars:
        eigenstate_breakglass_output_dir: "{{ playbook_dir }}/../build/openshift-identity-static"
      tags: breakglass
