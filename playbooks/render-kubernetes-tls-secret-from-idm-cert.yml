---
- name: Render Kubernetes TLS Secret manifest from IdM certificate material
  hosts: localhost
  gather_facts: false
  roles:
    - role: eigenstate.ipa.kubernetes_tls_from_idm_cert
      vars:
        eigenstate_k8s_tls_render_only: true
        eigenstate_k8s_tls_apply: false
        eigenstate_k8s_tls_render_review_manifest: true
        eigenstate_k8s_tls_write_payload_manifest: false
