---
- name: Seed FreeIPA with integration test data
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    admin_password: "{{ ipa_password }}"
    user_password: UserPass123

  tasks:

    # ----------------------------------------------------------------
    # Authenticate
    # ----------------------------------------------------------------

    - name: Acquire admin ticket
      ansible.builtin.shell: >
        echo {{ admin_password }} | kinit admin
      changed_when: true

    # ----------------------------------------------------------------
    # Users
    # ----------------------------------------------------------------

    - name: Create test users
      ansible.builtin.shell: >
        echo {{ user_password }} | ipa user-add {{ item }}
        --first=Test --last={{ item }} --password
      register: result
      failed_when: "result.rc != 0 and 'already exists' not in result.stderr"
      changed_when: "'already exists' not in result.stderr"
      loop:
        - test-user-01
        - test-user-02
        - test-user-03
        - svc-deploy
        - lease-user-01
        - lease-user-02
        - otp-user
        - vault-user

    # ----------------------------------------------------------------
    # Groups
    # ----------------------------------------------------------------

    - name: Create user groups
      ansible.builtin.command: >
        ipa group-add {{ item.name }} --desc="{{ item.desc }}"
      register: result
      failed_when: "result.rc != 0 and 'already exists' not in result.stderr"
      changed_when: "'already exists' not in result.stderr"
      loop:
        - { name: operators, desc: "Operations team" }
        - { name: developers, desc: "Development team" }
        - { name: lease-targets, desc: "Users eligible for time-bounded leases" }
        - { name: vault-readers, desc: "Users allowed to read shared vaults" }

    - name: Add users to groups
      ansible.builtin.command: >
        ipa group-add-member {{ item.group }} --users={{ item.user }}
      register: result
      failed_when: "result.rc != 0 and 'already a member' not in result.stderr and 'already added' not in result.stdout"
      changed_when: result.rc == 0
      loop:
        - { group: operators, user: svc-deploy }
        - { group: developers, user: test-user-01 }
        - { group: lease-targets, user: lease-user-01 }
        - { group: lease-targets, user: lease-user-02 }

    # ----------------------------------------------------------------
    # Hosts
    # ----------------------------------------------------------------

    - name: Create host entries
      ansible.builtin.command: >
        ipa host-add {{ item }} --force
      register: result
      failed_when: "result.rc != 0 and 'already exists' not in result.stderr"
      changed_when: "'already exists' not in result.stderr"
      loop:
        - web-01.test.lan
        - web-02.test.lan
        - web-03.test.lan
        - db-01.test.lan
        - app-01.test.lan
        - node-01.test.lan

    # ----------------------------------------------------------------
    # Hostgroups
    # ----------------------------------------------------------------

    - name: Create hostgroups
      ansible.builtin.command: >
        ipa hostgroup-add {{ item.name }} --desc="{{ item.desc }}"
      register: result
      failed_when: "result.rc != 0 and 'already exists' not in result.stderr"
      changed_when: "'already exists' not in result.stderr"
      loop:
        - { name: webservers, desc: "Web server tier" }
        - { name: dbservers, desc: "Database server tier" }

    - name: Add hosts to hostgroups
      ansible.builtin.command: >
        ipa hostgroup-add-member {{ item.group }} --hosts={{ item.host }}
      register: result
      failed_when: "result.rc != 0 and 'already a member' not in result.stderr and 'already added' not in result.stdout"
      changed_when: result.rc == 0
      loop:
        - { group: webservers, host: web-01.test.lan }
        - { group: webservers, host: web-02.test.lan }
        - { group: webservers, host: web-03.test.lan }
        - { group: dbservers, host: db-01.test.lan }

    # ----------------------------------------------------------------
    # Service principals
    # ----------------------------------------------------------------

    - name: Create service principals
      ansible.builtin.command: >
        ipa service-add {{ item }} --force
      register: result
      failed_when: "result.rc != 0 and 'already exists' not in result.stderr"
      changed_when: "'already exists' not in result.stderr"
      loop:
        - HTTP/web-01.test.lan
        - HTTP/web-02.test.lan
        - nfs/app-01.test.lan

    - name: Generate keytabs for service principals
      ansible.builtin.command: >
        ipa-getkeytab -s ipa.test.lan -p {{ item }}
        -k /tmp/{{ item | regex_replace("/", "_") }}.keytab
      register: result
      failed_when: result.rc != 0
      changed_when: true
      loop:
        - HTTP/web-01.test.lan
        - nfs/app-01.test.lan

    - name: Allow admin to retrieve service keytabs
      ansible.builtin.shell: |
        ipa service-allow-retrieve-keytab {{ item }} --users=admin 2>/dev/null || true
      loop:
        - HTTP/web-01.test.lan
        - nfs/app-01.test.lan

    # ----------------------------------------------------------------
    # DNS records
    # ----------------------------------------------------------------

    - name: Create forward DNS A records
      ansible.builtin.command: >
        ipa dnsrecord-add test.lan {{ item.name }} --a-rec={{ item.ip }}
      register: result
      failed_when: "result.rc != 0 and 'already exists' not in result.stderr"
      changed_when: "'already exists' not in result.stderr"
      loop:
        - { name: web-01, ip: "172.16.0.10" }
        - { name: web-02, ip: "172.16.0.11" }
        - { name: db-01, ip: "172.16.0.20" }
        - { name: app-01, ip: "172.16.0.30" }

    - name: Create MX record
      ansible.builtin.command: >
        ipa dnsrecord-add test.lan @ --mx-rec="10 mail.test.lan."
      register: result
      failed_when: "result.rc != 0 and 'already exists' not in result.stderr"
      changed_when: "'already exists' not in result.stderr"

    - name: Create TXT record
      ansible.builtin.command: >
        ipa dnsrecord-add test.lan _test --txt-rec="integration-test-value"
      register: result
      failed_when: "result.rc != 0 and 'already exists' not in result.stderr"
      changed_when: "'already exists' not in result.stderr"

    - name: Create reverse DNS zone
      ansible.builtin.command: >
        ipa dnszone-add 0.16.172.in-addr.arpa
      register: result
      failed_when: "result.rc != 0 and 'already exists' not in result.stderr"
      changed_when: "'already exists' not in result.stderr"

    - name: Create PTR records
      ansible.builtin.command: >
        ipa dnsrecord-add 0.16.172.in-addr.arpa {{ item.octet }}
        --ptr-rec={{ item.ptr }}
      register: result
      failed_when: "result.rc != 0 and 'already exists' not in result.stderr"
      changed_when: "'already exists' not in result.stderr"
      loop:
        - { octet: "10", ptr: "web-01.test.lan." }
        - { octet: "20", ptr: "db-01.test.lan." }

    # ----------------------------------------------------------------
    # Vaults
    # ----------------------------------------------------------------

    - name: Create shared standard vaults
      ansible.builtin.command: >
        ipa vault-add {{ item.name }} --shared --type=standard
      register: result
      failed_when: "result.rc != 0 and 'already exists' not in result.stderr"
      changed_when: "'already exists' not in result.stderr"
      loop:
        - { name: db-password }
        - { name: api-key }

    - name: Archive db-password vault
      ansible.builtin.shell: |
        printf '%s' 's3cret-db-pass' | ipa vault-archive db-password --shared --in /dev/stdin
      register: result
      failed_when: result.rc != 0
      changed_when: true

    - name: Write api-key JSON payload to file
      ansible.builtin.copy:
        dest: /tmp/api-key-payload.json
        content: '{"key":"ak_xyz789","env":"test"}'
        mode: "0600"

    - name: Archive api-key vault from file
      ansible.builtin.command: >
        ipa vault-archive api-key --shared --in /tmp/api-key-payload.json
      register: result
      failed_when: result.rc != 0
      changed_when: true

    - name: Create user-scoped vault
      ansible.builtin.shell: |
        ipa vault-add personal-secret --user=vault-user --type=standard 2>/dev/null || true
        echo -n "my-private-data" | ipa vault-archive personal-secret --user=vault-user --in /dev/stdin
      register: result
      failed_when: result.rc != 0
      changed_when: true

    # ----------------------------------------------------------------
    # Sudo objects
    # ----------------------------------------------------------------

    - name: Create sudo commands
      ansible.builtin.command: >
        ipa sudocmd-add "{{ item }}"
      register: result
      failed_when: "result.rc != 0 and 'already exists' not in result.stderr"
      changed_when: "'already exists' not in result.stderr"
      loop:
        - /usr/bin/systemctl
        - /usr/bin/journalctl

    - name: Create sudo command group
      ansible.builtin.command: >
        ipa sudocmdgroup-add service-management --desc="Service management commands"
      register: result
      failed_when: "result.rc != 0 and 'already exists' not in result.stderr"
      changed_when: "'already exists' not in result.stderr"

    - name: Add commands to command group
      ansible.builtin.command: >
        ipa sudocmdgroup-add-member service-management
        --sudocmds="{{ item }}"
      register: result
      failed_when: "result.rc != 0 and 'already a member' not in result.stderr and 'already added' not in result.stdout"
      changed_when: result.rc == 0
      loop:
        - /usr/bin/systemctl
        - /usr/bin/journalctl

    - name: Create enabled sudo rule
      ansible.builtin.shell: |
        ipa sudorule-add ops-maintenance --desc="Operations maintenance" 2>/dev/null || true
        ipa sudorule-add-user ops-maintenance --users=svc-deploy 2>/dev/null || true
        ipa sudorule-add-host ops-maintenance --hostgroups=webservers 2>/dev/null || true
        ipa sudorule-add-allow-command ops-maintenance --sudocmds=/usr/bin/systemctl 2>/dev/null || true
      changed_when: true

    - name: Create disabled sudo rule
      ansible.builtin.shell: |
        ipa sudorule-add disabled-rule --desc="Disabled rule" --hostcat=all --usercat=all --cmdcat=all 2>/dev/null || true
        ipa sudorule-disable disabled-rule 2>/dev/null || true
      changed_when: true

    # ----------------------------------------------------------------
    # HBAC rules
    # ----------------------------------------------------------------

    - name: Disable built-in allow_all HBAC rule
      ansible.builtin.command: >
        ipa hbacrule-disable allow_all
      register: result
      failed_when: "result.rc != 0 and 'already disabled' not in result.stderr"
      changed_when: "'already disabled' not in result.stderr"

    - name: Create HBAC rule — allow SSH for operators
      ansible.builtin.shell: |
        ipa hbacrule-add allow-ssh-ops --desc="SSH access for operators" 2>/dev/null || true
        ipa hbacrule-add-user allow-ssh-ops --users=svc-deploy 2>/dev/null || true
        ipa hbacrule-add-host allow-ssh-ops --hostgroups=webservers 2>/dev/null || true
        ipa hbacrule-add-service allow-ssh-ops --hbacsvcs=sshd 2>/dev/null || true
      changed_when: true

    - name: Create HBAC rule — allow all for admin
      ansible.builtin.shell: |
        ipa hbacrule-add allow-all-admin --desc="Full access for admin" --usercat=all --hostcat=all --servicecat=all 2>/dev/null || true
      changed_when: true

    - name: Create disabled HBAC rule
      ansible.builtin.shell: |
        ipa hbacrule-add disabled-hbac --desc="Disabled HBAC rule" --usercat=all --hostcat=all --servicecat=all 2>/dev/null || true
        ipa hbacrule-disable disabled-hbac 2>/dev/null || true
      changed_when: true

    # ----------------------------------------------------------------
    # SELinux user maps
    # ----------------------------------------------------------------

    - name: Create enabled SELinux user map
      ansible.builtin.shell: |
        ipa selinuxusermap-add ops-deploy-map --selinuxuser="staff_u:s0-s0:c0.c1023" --desc="Staff context for operators" 2>/dev/null || true
        ipa selinuxusermap-add-user ops-deploy-map --users=svc-deploy 2>/dev/null || true
      changed_when: true

    - name: Create disabled SELinux user map
      ansible.builtin.shell: |
        ipa selinuxusermap-add guest-map --selinuxuser="guest_u:s0" --desc="Guest context" --usercat=all 2>/dev/null || true
        ipa selinuxusermap-disable guest-map 2>/dev/null || true
      changed_when: true

    # ----------------------------------------------------------------
    # CSR for cert testing
    # ----------------------------------------------------------------

    - name: Generate CSR for cert request testing
      ansible.builtin.command: >
        openssl req -new -newkey rsa:2048 -nodes
        -keyout /tmp/integ-test-key.pem
        -out /tmp/integ-test-csr.pem
        -subj "/CN=web-02.test.lan"
      args:
        creates: /tmp/integ-test-csr.pem

    - name: Destroy admin ticket
      ansible.builtin.command: kdestroy
      changed_when: true

    - name: Seed complete
      ansible.builtin.debug:
        msg: "All integration test data seeded successfully"
