# =====================================================================
# Inventory Plugin
# =====================================================================
- name: "Integration: eigenstate.ipa.idm inventory"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [inventory]
  vars:
    server: "{{ ipa_server }}"
    password: "{{ ipa_password }}"
    ca_cert: "{{ ipa_ca_cert }}"
  tasks:

    - name: "inventory: write temporary inventory config"
      ansible.builtin.copy:
        dest: /tmp/integ-test-inventory.eigenstate_ipa.yml
        content: |
          plugin: eigenstate.ipa.idm
          server: {{ server }}
          ipaadmin_password: {{ password }}
          verify: {{ ca_cert }}
          sources:
            - hosts
            - hostgroups
          hostvars_enabled: true
        mode: "0600"

    - name: "inventory: run ansible-inventory"
      ansible.builtin.command: >
        ansible-inventory -i /tmp/integ-test-inventory.eigenstate_ipa.yml
        --list
      register: inv_output

    - name: "inventory: parse JSON output"
      ansible.builtin.set_fact:
        inv_data: "{{ inv_output.stdout | from_json }}"

    - name: "inventory: assert hosts present"
      ansible.builtin.assert:
        that:
          - "'web-01.test.lan' in (inv_data._meta.hostvars | default({}))"
          - "'db-01.test.lan' in (inv_data._meta.hostvars | default({}))"
        fail_msg: "Inventory should contain seeded hosts: {{ inv_data._meta.hostvars | default({}) | list }}"

    - name: "inventory: assert hostgroup becomes Ansible group"
      ansible.builtin.assert:
        that:
          - "'idm_hostgroup_webservers' in inv_data"
        fail_msg: "Hostgroups should become Ansible groups: {{ inv_data | list }}"

    - name: "inventory: assert hostvars exported"
      ansible.builtin.assert:
        that:
          - inv_data._meta.hostvars['web-01.test.lan'].idm_fqdn is defined
        fail_msg: "Hostvars should include idm_fqdn"

    - name: "inventory: clean up temp file"
      ansible.builtin.file:
        path: /tmp/integ-test-inventory.eigenstate_ipa.yml
        state: absent

# =====================================================================
# User Lease Module
# =====================================================================
- name: "Integration: eigenstate.ipa.user_lease"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [user_lease]
  vars:
    server: "{{ ipa_server }}"
    password: "{{ ipa_password }}"
    ca_cert: "{{ ipa_ca_cert }}"
  tasks:

    - name: "user_lease: set 2-hour lease"
      eigenstate.ipa.user_lease:
        username: lease-user-01
        state: present
        principal_expiration: "02:00"
        server: "{{ server }}"
        ipaadmin_password: "{{ password }}"
        verify: "{{ ca_cert }}"
      register: lease_set

    - name: "user_lease: assert lease set"
      ansible.builtin.assert:
        that:
          - lease_set.changed
          - lease_set.principal_expiration_after is defined
          - lease_set.principal_expiration_after | length > 0
        fail_msg: "Lease should be set: {{ lease_set }}"

    - name: "user_lease: check_mode on lease-user-02"
      eigenstate.ipa.user_lease:
        username: lease-user-02
        state: present
        principal_expiration: "01:00"
        server: "{{ server }}"
        ipaadmin_password: "{{ password }}"
        verify: "{{ ca_cert }}"
      check_mode: true
      register: lease_check

    - name: "user_lease: assert check_mode reports changed"
      ansible.builtin.assert:
        that: lease_check.changed
        fail_msg: "Check mode should report changed=true"

    - name: "user_lease: verify check_mode did not mutate"
      ansible.builtin.set_fact:
        lease_verify: >-
          {{ lookup('eigenstate.ipa.principal', 'lease-user-02',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "user_lease: assert no actual expiration set"
      ansible.builtin.assert:
        that: not (lease_verify.disabled | default(false))
        fail_msg: "Check mode should not have changed the principal"

    - name: "user_lease: expire immediately"
      eigenstate.ipa.user_lease:
        username: lease-user-01
        state: expired
        server: "{{ server }}"
        ipaadmin_password: "{{ password }}"
        verify: "{{ ca_cert }}"
      register: lease_expire

    - name: "user_lease: assert expired"
      ansible.builtin.assert:
        that: lease_expire.changed
        fail_msg: "Expire should be changed=true"

    - name: "user_lease: clear expiration"
      eigenstate.ipa.user_lease:
        username: lease-user-01
        state: cleared
        server: "{{ server }}"
        ipaadmin_password: "{{ password }}"
        verify: "{{ ca_cert }}"
      register: lease_clear

    - name: "user_lease: assert cleared"
      ansible.builtin.assert:
        that: lease_clear.changed
        fail_msg: "Clear should be changed=true"

    - name: "user_lease: require_groups validation"
      eigenstate.ipa.user_lease:
        username: lease-user-01
        state: present
        principal_expiration: "01:00"
        require_groups:
          - lease-targets
        server: "{{ server }}"
        ipaadmin_password: "{{ password }}"
        verify: "{{ ca_cert }}"
      register: lease_group

    - name: "user_lease: assert group-gated lease succeeded"
      ansible.builtin.assert:
        that:
          - lease_group.changed
          - "'lease-targets' in lease_group.groups_checked"
        fail_msg: "Group-gated lease should succeed: {{ lease_group }}"
