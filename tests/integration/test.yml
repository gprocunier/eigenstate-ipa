---
# =====================================================================
# eigenstate.ipa — Integration test suite
#
# Exercises every plugin operation against a live FreeIPA server.
# Each play is tagged by plugin name for selective execution:
#   ansible-playbook test.yml --tags dns
#   ansible-playbook test.yml --tags vault,vault_write
# =====================================================================

# =====================================================================
# DNS Plugin
# =====================================================================
- name: "Integration: eigenstate.ipa.dns"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [dns]
  vars:
    server: "{{ ipa_server }}"
    password: "{{ ipa_password }}"
    ca_cert: "{{ ipa_ca_cert }}"
  tasks:

    - name: "dns: show A record"
      ansible.builtin.set_fact:
        dns_a: >-
          {{ lookup('eigenstate.ipa.dns', 'web-01',
             zone='test.lan',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "dns: assert A record exists with correct IP"
      ansible.builtin.assert:
        that:
          - dns_a.exists
          - dns_a.name == 'web-01'
          - dns_a.zone == 'test.lan'
          - dns_a.fqdn == 'web-01.test.lan'
          - "'arecord' in dns_a.records"
          - "'172.16.0.10' in dns_a.records.arecord"
        fail_msg: "DNS A record lookup failed: {{ dns_a }}"

    - name: "dns: show nonexistent record returns exists=false"
      ansible.builtin.set_fact:
        dns_missing: >-
          {{ lookup('eigenstate.ipa.dns', 'does-not-exist',
             zone='test.lan',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "dns: assert nonexistent record shape"
      ansible.builtin.assert:
        that:
          - not dns_missing.exists
          - dns_missing.name == 'does-not-exist'
        fail_msg: "Missing DNS record should have exists=false: {{ dns_missing }}"

    - name: "dns: show zone apex"
      ansible.builtin.set_fact:
        dns_apex: >-
          {{ lookup('eigenstate.ipa.dns', '@',
             zone='test.lan',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "dns: assert zone apex metadata"
      ansible.builtin.assert:
        that:
          - dns_apex.exists
          - dns_apex.is_zone_apex
          - dns_apex.zone_active is not none
        fail_msg: "Zone apex should expose metadata: {{ dns_apex }}"

    - name: "dns: find all records in zone"
      ansible.builtin.set_fact:
        dns_find: >-
          {{ lookup('eigenstate.ipa.dns',
             operation='find',
             zone='test.lan',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "dns: assert find returns multiple records"
      ansible.builtin.assert:
        that:
          - dns_find | length > 3
        fail_msg: "DNS find should return seeded records: {{ dns_find | length }}"

    - name: "dns: find PTR records in reverse zone"
      ansible.builtin.set_fact:
        dns_ptr: >-
          {{ lookup('eigenstate.ipa.dns',
             operation='find',
             zone='0.16.172.in-addr.arpa',
             record_type='ptrrecord',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "dns: assert PTR records found"
      ansible.builtin.assert:
        that:
          - dns_ptr | length >= 2
        fail_msg: "Should find PTR records in reverse zone: {{ dns_ptr }}"

    - name: "dns: show multiple records"
      ansible.builtin.set_fact:
        dns_multi: >-
          {{ lookup('eigenstate.ipa.dns',
             'web-01', 'db-01',
             zone='test.lan',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert, wantlist=true) }}

    - name: "dns: assert multiple records returned"
      ansible.builtin.assert:
        that:
          - dns_multi | length == 2
          - dns_multi[0].exists
          - dns_multi[1].exists
        fail_msg: "Should return 2 records: {{ dns_multi | length }}"

# =====================================================================
# Vault Plugin (read-only lookups)
# =====================================================================
- name: "Integration: eigenstate.ipa.vault"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [vault]
  vars:
    server: "{{ ipa_server }}"
    password: "{{ ipa_password }}"
    ca_cert: "{{ ipa_ca_cert }}"
  tasks:

    - name: "vault: retrieve shared standard vault"
      ansible.builtin.set_fact:
        vault_plain: >-
          {{ lookup('eigenstate.ipa.vault', 'db-password',
             shared=true,
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "vault: assert plaintext payload"
      ansible.builtin.assert:
        that:
          - vault_plain == 's3cret-db-pass'
        fail_msg: "Vault payload mismatch: {{ vault_plain }}"

    - name: "vault: retrieve with base64 encoding"
      ansible.builtin.set_fact:
        vault_b64: >-
          {{ lookup('eigenstate.ipa.vault', 'db-password',
             shared=true,
             encoding='base64',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "vault: assert base64 encoded"
      ansible.builtin.assert:
        that:
          - vault_b64 | length > 0
          - vault_b64 != 's3cret-db-pass'
        fail_msg: "Should be base64 encoded: {{ vault_b64 }}"

    - name: "vault: retrieve with record format"
      ansible.builtin.set_fact:
        vault_rec: >-
          {{ lookup('eigenstate.ipa.vault', 'db-password',
             shared=true,
             result_format='record',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "vault: assert record structure"
      ansible.builtin.assert:
        that:
          - vault_rec.name == 'db-password'
          - vault_rec.scope == 'shared'
          - vault_rec.encoding == 'utf-8'
          - vault_rec.value == 's3cret-db-pass'
        fail_msg: "Record format incorrect: {{ vault_rec }}"

    - name: "vault: retrieve JSON vault with decode_json"
      ansible.builtin.set_fact:
        vault_json: >-
          {{ lookup('eigenstate.ipa.vault', 'api-key',
             shared=true,
             result_format='record',
             decode_json=true,
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "vault: assert decoded JSON structure"
      ansible.builtin.assert:
        that:
          - vault_json.value.key == 'ak_xyz789'
          - vault_json.value.env == 'test'
        fail_msg: "JSON decode failed: {{ vault_json }}"

    - name: "vault: show metadata"
      ansible.builtin.set_fact:
        vault_meta: >-
          {{ lookup('eigenstate.ipa.vault', 'db-password',
             shared=true,
             operation='show',
             result_format='record',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "vault: assert metadata"
      ansible.builtin.assert:
        that:
          - vault_meta.name == 'db-password'
          - vault_meta.type == 'standard'
          - vault_meta.scope == 'shared'
        fail_msg: "Vault metadata incorrect: {{ vault_meta }}"

    - name: "vault: find shared vaults"
      ansible.builtin.set_fact:
        vault_find: >-
          {{ lookup('eigenstate.ipa.vault',
             operation='find',
             shared=true,
             result_format='record',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert, wantlist=true) }}

    - name: "vault: assert find results"
      ansible.builtin.assert:
        that:
          - vault_find | length >= 2
          - vault_find | map(attribute='name') | list is superset(['db-password', 'api-key'])
        fail_msg: "Find should include seeded vaults: {{ vault_find | map(attribute='name') | list }}"

    - name: "vault: retrieve user-scoped vault"
      ansible.builtin.set_fact:
        vault_user: >-
          {{ lookup('eigenstate.ipa.vault', 'personal-secret',
             username='vault-user',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "vault: assert user-scoped payload"
      ansible.builtin.assert:
        that:
          - vault_user == 'my-private-data'
        fail_msg: "User vault payload mismatch: {{ vault_user }}"

# =====================================================================
# Vault Write Module
# =====================================================================
- name: "Integration: eigenstate.ipa.vault_write"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [vault_write]
  vars:
    server: "{{ ipa_server }}"
    password: "{{ ipa_password }}"
    ca_cert: "{{ ipa_ca_cert }}"
  tasks:

    - name: "vault_write: create shared standard vault"
      eigenstate.ipa.vault_write:
        name: integ-test-vault
        state: present
        shared: true
        description: "Integration test vault"
        server: "{{ server }}"
        ipaadmin_password: "{{ password }}"
        verify: "{{ ca_cert }}"
      register: vw_create

    - name: "vault_write: assert created"
      ansible.builtin.assert:
        that: vw_create.changed
        fail_msg: "Vault creation should be changed=true"

    - name: "vault_write: idempotent create"
      eigenstate.ipa.vault_write:
        name: integ-test-vault
        state: present
        shared: true
        description: "Integration test vault"
        server: "{{ server }}"
        ipaadmin_password: "{{ password }}"
        verify: "{{ ca_cert }}"
      register: vw_idem

    - name: "vault_write: assert idempotent"
      ansible.builtin.assert:
        that: not vw_idem.changed
        fail_msg: "Idempotent create should be changed=false"

    - name: "vault_write: archive payload"
      eigenstate.ipa.vault_write:
        name: integ-test-vault
        state: archived
        shared: true
        data: "test-data-123"
        server: "{{ server }}"
        ipaadmin_password: "{{ password }}"
        verify: "{{ ca_cert }}"
      register: vw_archive

    - name: "vault_write: assert archive changed"
      ansible.builtin.assert:
        that: vw_archive.changed
        fail_msg: "Archive should be changed=true"

    - name: "vault_write: verify archived payload via retrieve"
      ansible.builtin.set_fact:
        vw_verify: >-
          {{ lookup('eigenstate.ipa.vault', 'integ-test-vault',
             shared=true,
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "vault_write: assert payload matches"
      ansible.builtin.assert:
        that: vw_verify == 'test-data-123'
        fail_msg: "Retrieved payload should match: {{ vw_verify }}"

    - name: "vault_write: idempotent archive same payload"
      eigenstate.ipa.vault_write:
        name: integ-test-vault
        state: archived
        shared: true
        data: "test-data-123"
        server: "{{ server }}"
        ipaadmin_password: "{{ password }}"
        verify: "{{ ca_cert }}"
      register: vw_arch_idem

    - name: "vault_write: assert idempotent archive"
      ansible.builtin.assert:
        that: not vw_arch_idem.changed
        fail_msg: "Same payload should be changed=false"

    - name: "vault_write: archive different payload"
      eigenstate.ipa.vault_write:
        name: integ-test-vault
        state: archived
        shared: true
        data: "updated-data-456"
        server: "{{ server }}"
        ipaadmin_password: "{{ password }}"
        verify: "{{ ca_cert }}"
      register: vw_arch_new

    - name: "vault_write: assert changed on different payload"
      ansible.builtin.assert:
        that: vw_arch_new.changed
        fail_msg: "Different payload should be changed=true"

    - name: "vault_write: delete vault"
      eigenstate.ipa.vault_write:
        name: integ-test-vault
        state: absent
        shared: true
        server: "{{ server }}"
        ipaadmin_password: "{{ password }}"
        verify: "{{ ca_cert }}"
      register: vw_del

    - name: "vault_write: assert deleted"
      ansible.builtin.assert:
        that: vw_del.changed
        fail_msg: "Delete should be changed=true"

    - name: "vault_write: idempotent delete"
      eigenstate.ipa.vault_write:
        name: integ-test-vault
        state: absent
        shared: true
        server: "{{ server }}"
        ipaadmin_password: "{{ password }}"
        verify: "{{ ca_cert }}"
      register: vw_del_idem

    - name: "vault_write: assert idempotent delete"
      ansible.builtin.assert:
        that: not vw_del_idem.changed
        fail_msg: "Absent vault delete should be changed=false"

# =====================================================================
# Principal Plugin
# =====================================================================
- name: "Integration: eigenstate.ipa.principal"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [principal]
  vars:
    server: "{{ ipa_server }}"
    password: "{{ ipa_password }}"
    ca_cert: "{{ ipa_ca_cert }}"
  tasks:

    - name: "principal: show user principal"
      ansible.builtin.set_fact:
        princ_user: >-
          {{ lookup('eigenstate.ipa.principal', 'test-user-01',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "principal: assert user exists"
      ansible.builtin.assert:
        that:
          - princ_user.exists
          - princ_user.type == 'user'
        fail_msg: "User principal should exist: {{ princ_user }}"

    - name: "principal: show host principal"
      ansible.builtin.set_fact:
        princ_host: >-
          {{ lookup('eigenstate.ipa.principal', 'web-01.test.lan',
             principal_type='host',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "principal: assert host exists"
      ansible.builtin.assert:
        that:
          - princ_host.exists
          - princ_host.type == 'host'
        fail_msg: "Host principal should exist: {{ princ_host }}"

    - name: "principal: show service principal"
      ansible.builtin.set_fact:
        princ_svc: >-
          {{ lookup('eigenstate.ipa.principal', 'HTTP/web-01.test.lan',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "principal: assert service exists with keytab"
      ansible.builtin.assert:
        that:
          - princ_svc.exists
          - princ_svc.type == 'service'
          - princ_svc.has_keytab
        fail_msg: "Service principal should exist with keytab: {{ princ_svc }}"

    - name: "principal: show nonexistent"
      ansible.builtin.set_fact:
        princ_none: >-
          {{ lookup('eigenstate.ipa.principal', 'nonexistent-user',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "principal: assert not found"
      ansible.builtin.assert:
        that: not princ_none.exists
        fail_msg: "Nonexistent principal should have exists=false"

    - name: "principal: find users"
      ansible.builtin.set_fact:
        princ_find: >-
          {{ lookup('eigenstate.ipa.principal',
             operation='find',
             criteria='test-user',
             principal_type='user',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "principal: assert find returns results"
      ansible.builtin.assert:
        that: princ_find | length >= 3
        fail_msg: "Should find test-user-01..03: {{ princ_find | length }}"

    - name: "principal: show multiple principals"
      ansible.builtin.set_fact:
        princ_multi: >-
          {{ lookup('eigenstate.ipa.principal',
             'test-user-01', 'svc-deploy',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert, wantlist=true) }}

    - name: "principal: assert multiple results"
      ansible.builtin.assert:
        that:
          - princ_multi | length == 2
          - princ_multi[0].exists
          - princ_multi[1].exists
        fail_msg: "Should return 2 principals: {{ princ_multi | length }}"

# =====================================================================
# Keytab Plugin
# =====================================================================
- name: "Integration: eigenstate.ipa.keytab"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [keytab]
  vars:
    server: "{{ ipa_server }}"
    password: "{{ ipa_password }}"
    ca_cert: "{{ ipa_ca_cert }}"
  tasks:

    - name: "keytab: retrieve service keytab"
      ansible.builtin.set_fact:
        kt_value: >-
          {{ lookup('eigenstate.ipa.keytab', 'HTTP/web-01.test.lan',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "keytab: assert base64 keytab non-empty"
      ansible.builtin.assert:
        that:
          - kt_value | length > 10
        fail_msg: "Keytab should be a non-empty base64 string: {{ kt_value[:20] }}..."

    - name: "keytab: retrieve with record format"
      ansible.builtin.set_fact:
        kt_rec: >-
          {{ lookup('eigenstate.ipa.keytab', 'HTTP/web-01.test.lan',
             result_format='record',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "keytab: assert record structure"
      ansible.builtin.assert:
        that:
          - kt_rec.principal == 'HTTP/web-01.test.lan'
          - kt_rec.encoding == 'base64'
          - kt_rec.value | length > 10
        fail_msg: "Keytab record format incorrect: {{ kt_rec }}"


# =====================================================================
# Cert Plugin
# =====================================================================
- name: "Integration: eigenstate.ipa.cert"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [cert]
  vars:
    server: "{{ ipa_server }}"
    password: "{{ ipa_password }}"
    ca_cert: "{{ ipa_ca_cert }}"
  tasks:

    - name: "cert: read CSR from seed phase"
      ansible.builtin.slurp:
        src: /tmp/integ-test-csr.pem
      register: csr_content

    - name: "cert: request certificate for HTTP/web-02"
      ansible.builtin.set_fact:
        cert_pem: >-
          {{ lookup('eigenstate.ipa.cert', 'HTTP/web-02.test.lan',
             operation='request',
             csr=csr_content.content | b64decode,
             add=true,
             result_format='record',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "cert: assert PEM certificate returned"
      ansible.builtin.assert:
        that:
          - "'-----BEGIN CERTIFICATE-----' in cert_pem.value"
          - cert_pem.metadata.serial_number is defined
          - cert_pem.metadata.subject is defined
        fail_msg: "Cert request should return PEM: {{ cert_pem.value[:40] }}..."

    - name: "cert: retrieve by serial number"
      ansible.builtin.set_fact:
        cert_serial: >-
          {{ lookup('eigenstate.ipa.cert',
             cert_pem.metadata.serial_number | string,
             operation='retrieve',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "cert: assert retrieve returns PEM"
      ansible.builtin.assert:
        that:
          - "'-----BEGIN CERTIFICATE-----' in cert_serial"
        fail_msg: "Cert retrieve should return PEM"

    - name: "cert: find certificates"
      ansible.builtin.set_fact:
        cert_find: >-
          {{ lookup('eigenstate.ipa.cert',
             operation='find',
             result_format='record',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "cert: assert find returns results"
      ansible.builtin.assert:
        that:
          - cert_find | length > 0
        fail_msg: "Cert find should return results"

    - name: "cert: find with principal filter"
      ansible.builtin.set_fact:
        cert_find_svc: >-
          {{ lookup('eigenstate.ipa.cert',
             operation='find',
             principal='HTTP/web-02.test.lan',
             result_format='record',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "cert: assert filtered find"
      ansible.builtin.assert:
        that:
          - cert_find_svc | length >= 1
        fail_msg: "Filtered cert find should return the requested cert"

# =====================================================================
# OTP Plugin
# =====================================================================
- name: "Integration: eigenstate.ipa.otp"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [otp]
  vars:
    server: "{{ ipa_server }}"
    password: "{{ ipa_password }}"
    ca_cert: "{{ ipa_ca_cert }}"
  tasks:

    - name: "otp: add TOTP token"
      ansible.builtin.set_fact:
        otp_add: >-
          {{ lookup('eigenstate.ipa.otp', 'otp-user',
             operation='add',
             token_type='totp',
             result_format='record',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "otp: assert TOTP token created"
      ansible.builtin.assert:
        that:
          - otp_add.token_id is defined
          - otp_add.type == 'totp'
          - "'otpauth://' in otp_add.uri"
        fail_msg: "TOTP add should return token record: {{ otp_add }}"

    - name: "otp: save token ID for later"
      ansible.builtin.set_fact:
        saved_token_id: "{{ otp_add.token_id }}"

    - name: "otp: show token by ID"
      ansible.builtin.set_fact:
        otp_show: >-
          {{ lookup('eigenstate.ipa.otp', saved_token_id,
             operation='show',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "otp: assert show returns metadata"
      ansible.builtin.assert:
        that:
          - otp_show.exists
          - otp_show.token_id == saved_token_id
        fail_msg: "OTP show should return token: {{ otp_show }}"

    - name: "otp: find tokens for owner"
      ansible.builtin.set_fact:
        otp_find: >-
          {{ lookup('eigenstate.ipa.otp',
             operation='find',
             owner='otp-user',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "otp: assert find returns results"
      ansible.builtin.assert:
        that:
          - otp_find | length >= 1
        fail_msg: "OTP find should return tokens"

    - name: "otp: revoke token"
      ansible.builtin.set_fact:
        otp_revoke: >-
          {{ lookup('eigenstate.ipa.otp', saved_token_id,
             operation='revoke',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "otp: assert revoke succeeded"
      ansible.builtin.assert:
        that:
          - otp_revoke | length > 0
        fail_msg: "OTP revoke should return token ID"

    - name: "otp: add host enrollment password"
      ansible.builtin.set_fact:
        otp_host: >-
          {{ lookup('eigenstate.ipa.otp', 'app-01.test.lan',
             operation='add',
             token_type='host',
             result_format='record',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "otp: assert host enrollment password"
      ansible.builtin.assert:
        that:
          - otp_host.password is defined
          - otp_host.password | length > 0
          - otp_host.fqdn == 'app-01.test.lan'
        fail_msg: "Host enrollment should return password: {{ otp_host }}"

# =====================================================================
# HBAC Rule Plugin
# =====================================================================
- name: "Integration: eigenstate.ipa.hbacrule"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [hbacrule]
  vars:
    server: "{{ ipa_server }}"
    password: "{{ ipa_password }}"
    ca_cert: "{{ ipa_ca_cert }}"
  tasks:

    - name: "hbacrule: show enabled rule"
      ansible.builtin.set_fact:
        hbac_show: >-
          {{ lookup('eigenstate.ipa.hbacrule', 'allow-ssh-ops',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "hbacrule: assert enabled rule"
      ansible.builtin.assert:
        that:
          - hbac_show.exists
