    - name: "hbacrule: show nonexistent"
      ansible.builtin.set_fact:
        hbac_missing: >-
          {{ lookup('eigenstate.ipa.hbacrule', 'nonexistent-rule',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "hbacrule: assert not found"
