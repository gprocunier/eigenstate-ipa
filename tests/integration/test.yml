        that: not hbac_missing.exists
        fail_msg: "Missing HBAC rule should have exists=false"

    - name: "hbacrule: show disabled rule"
      ansible.builtin.set_fact:
        hbac_disabled: >-
          {{ lookup('eigenstate.ipa.hbacrule', 'disabled-hbac',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "hbacrule: assert disabled"
      ansible.builtin.assert:
        that:
          - hbac_disabled.exists
          - not hbac_disabled.enabled
        fail_msg: "Disabled HBAC rule should have enabled=false"

    - name: "hbacrule: find all rules"
      ansible.builtin.set_fact:
        hbac_find: >-
          {{ lookup('eigenstate.ipa.hbacrule',
             operation='find',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "hbacrule: assert multiple found"
      ansible.builtin.assert:
        that: hbac_find | length >= 3
        fail_msg: "Should find seeded HBAC rules: {{ hbac_find | length }}"

    - name: "hbacrule: test access decision"
      ansible.builtin.set_fact:
        hbac_test: >-
          {{ lookup('eigenstate.ipa.hbacrule',
             'svc-deploy',
             operation='test',
             targethost='web-01.test.lan',
             service='sshd',
             server=server,
             ipaadmin_password=password,
             verify=ca_cert) }}

    - name: "hbacrule: assert access test result"
      ansible.builtin.assert:
        that:
          - hbac_test.denied is defined
          - hbac_test.user == 'svc-deploy'
          - hbac_test.targethost == 'web-01.test.lan'
        fail_msg: "HBAC test should return access decision: {{ hbac_test }}"

