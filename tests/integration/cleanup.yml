---
- name: Clean up integration test artifacts
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    admin_password: "{{ ipa_password }}"

  tasks:

    - name: Acquire admin ticket
      ansible.builtin.shell: >
        echo {{ admin_password }} | kinit admin
      ignore_errors: true
      changed_when: true

    - name: Remove integration test vault
      ansible.builtin.command: >
        ipa vault-del integ-test-vault --shared
      ignore_errors: true
      changed_when: true

    - name: Clear lease expirations
      ansible.builtin.shell: >
        ipa user-mod {{ item }}
        --delattr=krbprincipalexpiration=* 2>/dev/null || true
      changed_when: true
      loop:
        - lease-user-01
        - lease-user-02

    - name: Re-enable built-in allow_all HBAC rule
      ansible.builtin.command: >
        ipa hbacrule-enable allow_all
      ignore_errors: true
      changed_when: true

    - name: Destroy admin ticket
      ansible.builtin.command: kdestroy
      ignore_errors: true
      changed_when: true

    - name: Remove temporary files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/integ-test-csr.pem
        - /tmp/integ-test-key.pem
        - /tmp/integ-test-inventory.eigenstate_ipa.yml
      ignore_errors: true
