---
argument_specs:
  main:
    short_description: Render read-only policy drift reports.
    options:
      eigenstate_policy_drift_report_output_dir:
        type: str
        default: ./artifacts
        description: Directory for report artifacts.
      eigenstate_policy_drift_report_basename:
        type: str
        default: policy-drift-report
        description: Basename for rendered report files.
      eigenstate_policy_drift_report_formats:
        type: list
        elements: str
        default: [json, yaml, md]
        description: Report formats to render.
      eigenstate_policy_drift_report_schema_version:
        type: str
        default: "1.0"
        description: Stable schema version for report consumers.
      eigenstate_policy_drift_report_generated_at_utc:
        type: str
        default: "1970-01-01T00:00:00Z"
        description: Deterministic UTC timestamp recorded in the report.
      eigenstate_policy_drift_report_site:
        type: str
        default: example
        description: Site or environment label for the report.
      eigenstate_policy_drift_report_context:
        type: str
        default: static validation
        description: Human-readable scope for this report run.
      eigenstate_policy_drift_report_expected_policies:
        type: list
        elements: dict
        description: Expected policy records from the reference baseline.
      eigenstate_policy_drift_report_observed_policies:
        type: list
        elements: dict
        description: Observed policy records from IdM, AAP, or cluster-adjacent fixtures.
      eigenstate_policy_drift_report_findings:
        type: list
        elements: dict
        description: Drift findings with remediation separated from this report phase.
