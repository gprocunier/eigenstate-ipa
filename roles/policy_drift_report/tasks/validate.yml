---
- name: Validate policy drift report format choices
  ansible.builtin.assert:
    that:
      - eigenstate_policy_drift_report_formats | difference(['json', 'yaml', 'md']) | length == 0
      - eigenstate_policy_drift_report_basename is match('^[A-Za-z0-9_.-]+$')
      - eigenstate_policy_drift_report_expected_policies is sequence
      - eigenstate_policy_drift_report_observed_policies is sequence
      - eigenstate_policy_drift_report_findings is sequence
    fail_msg: >-
      Policy drift reports support json, yaml, and md formats, a safe basename,
      and list inputs for expected policies, observed policies, and findings.

- name: Validate policy drift findings
  ansible.builtin.assert:
    that:
      - item.id is defined
      - item.kind is defined
      - item.status | default('unknown') in ['in_sync', 'drifted', 'missing', 'extra', 'unknown']
      - item.remediation_phase | default('') | length > 0
    fail_msg: "Policy drift findings require id, kind, status, and remediation_phase."
  loop: "{{ eigenstate_policy_drift_report_findings }}"
  loop_control:
    label: "{{ item.id | default('unnamed-policy') }}"
