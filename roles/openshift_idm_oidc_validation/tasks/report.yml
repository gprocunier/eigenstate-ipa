---
- name: Create OpenShift OIDC report directory
  ansible.builtin.file:
    path: "{{ eigenstate_oidc_output_dir }}"
    state: directory
    mode: "0750"

- name: Render OpenShift OIDC JSON report
  ansible.builtin.template:
    src: readiness-report.json.j2
    dest: "{{ eigenstate_oidc_output_dir }}/{{ eigenstate_oidc_basename }}.json"
    mode: "0640"
  when: "'json' in eigenstate_oidc_report_formats"

- name: Render OpenShift OIDC Markdown report
  ansible.builtin.template:
    src: readiness-report.md.j2
    dest: "{{ eigenstate_oidc_output_dir }}/{{ eigenstate_oidc_basename }}.md"
    mode: "0640"
  when: "'md' in eigenstate_oidc_report_formats"
