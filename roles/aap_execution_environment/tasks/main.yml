---
- ansible.builtin.import_tasks: render.yml
  when: eigenstate_ee_render | bool

- ansible.builtin.import_tasks: build.yml
  when: eigenstate_ee_build | bool

- ansible.builtin.import_tasks: smoke.yml
  when: eigenstate_ee_smoke | bool

- ansible.builtin.import_tasks: push.yml
  when: eigenstate_ee_push | bool

- ansible.builtin.import_tasks: register_controller.yml
  when: eigenstate_ee_register_controller | bool
