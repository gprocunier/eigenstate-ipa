---
- name: Verify registry image is configured
  ansible.builtin.assert:
    that:
      - eigenstate_ee_registry_image | length > 0
    fail_msg: "Set eigenstate_ee_registry_image before enabling eigenstate_ee_push."

- name: Verify container runtime is available
  ansible.builtin.command:
    argv:
      - "{{ eigenstate_ee_container_runtime }}"
      - --version
  changed_when: false

- name: Tag execution environment image for registry
  ansible.builtin.command:
    argv:
      - "{{ eigenstate_ee_container_runtime }}"
      - tag
      - "{{ eigenstate_ee_image }}"
      - "{{ eigenstate_ee_registry_image }}"
  changed_when: true

- name: Push execution environment image
  ansible.builtin.command:
    argv:
      - "{{ eigenstate_ee_container_runtime }}"
      - push
      - "--tls-verify={{ eigenstate_ee_registry_tls_verify | ternary('true', 'false') }}"
      - "{{ eigenstate_ee_registry_image }}"
  changed_when: true
