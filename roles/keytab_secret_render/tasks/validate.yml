---
- name: Validate keytab Secret variables
  ansible.builtin.assert:
    that:
      - eigenstate_keytab_secret_name is match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')
      - eigenstate_keytab_secret_namespace is match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')
      - eigenstate_keytab_secret_key is match('^[A-Za-z0-9_.-]+$')
      - eigenstate_keytab_secret_keytab_b64 | length > 0
      - eigenstate_keytab_secret_output_dir | length > 0
      - eigenstate_keytab_secret_basename is match('^[A-Za-z0-9_.-]+$')
      - eigenstate_keytab_secret_labels is mapping
      - eigenstate_keytab_secret_annotations is mapping
      - not (eigenstate_keytab_secret_apply | bool and eigenstate_keytab_secret_render_only | bool)
    fail_msg: Invalid keytab Secret render role configuration.
  no_log: "{{ eigenstate_keytab_secret_no_log }}"

- name: Validate keytab Secret apply inputs
  ansible.builtin.assert:
    that:
      - eigenstate_keytab_secret_kubeconfig | length > 0
      - eigenstate_keytab_secret_context | length > 0
      - eigenstate_keytab_secret_kubectl | length > 0
    fail_msg: Kubernetes apply requires explicit kubeconfig, context, and kubectl inputs.
  no_log: "{{ eigenstate_keytab_secret_no_log }}"
  when: eigenstate_keytab_secret_apply | bool
