---
- name: Create temporary access report output directory
  ansible.builtin.file:
    path: "{{ eigenstate_temporary_access_report_output_dir }}"
    state: directory
    mode: "0750"

- name: Build temporary access report object
  ansible.builtin.set_fact:
    eigenstate_temporary_access_report:
      schema: "eigenstate.ipa/temporary_access_report/v1"
      schema_version: "{{ eigenstate_temporary_access_report_schema_version }}"
      role: temporary_access_report
      generated_at_utc: "{{ eigenstate_temporary_access_report_generated_at_utc }}"
      site: "{{ eigenstate_temporary_access_report_site }}"
      context: "{{ eigenstate_temporary_access_report_context }}"
      read_only: true
      summary:
        total_windows: "{{ eigenstate_temporary_access_report_windows | length }}"
        active_windows: "{{ eigenstate_temporary_access_report_windows | selectattr('status', 'equalto', 'active') | list | length }}"
        expired_windows: "{{ eigenstate_temporary_access_report_windows | selectattr('status', 'equalto', 'expired') | list | length }}"
        scheduled_windows: "{{ eigenstate_temporary_access_report_windows | selectattr('status', 'equalto', 'scheduled') | list | length }}"
        revoked_windows: "{{ eigenstate_temporary_access_report_windows | selectattr('status', 'equalto', 'revoked') | list | length }}"
      windows: "{{ eigenstate_temporary_access_report_windows }}"

- name: Render temporary access JSON report
  ansible.builtin.template:
    src: report.json.j2
    dest: "{{ eigenstate_temporary_access_report_output_dir }}/{{ eigenstate_temporary_access_report_basename }}.json"
    mode: "0640"
  when: "'json' in eigenstate_temporary_access_report_formats"

- name: Render temporary access YAML report
  ansible.builtin.template:
    src: report.yaml.j2
    dest: "{{ eigenstate_temporary_access_report_output_dir }}/{{ eigenstate_temporary_access_report_basename }}.yaml"
    mode: "0640"
  when: "'yaml' in eigenstate_temporary_access_report_formats"

- name: Render temporary access Markdown report
  ansible.builtin.template:
    src: report.md.j2
    dest: "{{ eigenstate_temporary_access_report_output_dir }}/{{ eigenstate_temporary_access_report_basename }}.md"
    mode: "0640"
  when: "'md' in eigenstate_temporary_access_report_formats"
