---
- name: Create Kubernetes Secret output directory
  ansible.builtin.file:
    path: "{{ eigenstate_k8s_secret_output_dir }}"
    state: directory
    mode: "0750"

- name: Build Kubernetes Secret safe metadata
  ansible.builtin.set_fact:
    eigenstate_k8s_secret_generated_at: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
    eigenstate_k8s_secret_effective_annotations: >-
      {{ eigenstate_k8s_secret_annotations | combine({
          'eigenstate.ipa/source': 'idm-vault',
          'eigenstate.ipa/generated-at': lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ'),
          'eigenstate.ipa/payload': 'redacted-in-review-manifest'
        }) }}

- name: Add Kubernetes Secret correlation annotation
  ansible.builtin.set_fact:
    eigenstate_k8s_secret_effective_annotations: >-
      {{ eigenstate_k8s_secret_effective_annotations | combine({
          'eigenstate.ipa/correlation-id': eigenstate_k8s_secret_correlation_id
        }) }}
  when: eigenstate_k8s_secret_correlation_id | length > 0

- name: Render reviewable Kubernetes Secret manifest
  ansible.builtin.template:
    src: secret-review.yaml.j2
    dest: "{{ eigenstate_k8s_secret_output_dir }}/{{ eigenstate_k8s_secret_basename }}.review.yaml"
    mode: "0640"
  when: eigenstate_k8s_secret_render_review_manifest | bool

- name: Render protected Kubernetes Secret manifest with payload
  ansible.builtin.template:
    src: secret-payload.yaml.j2
    dest: "{{ eigenstate_k8s_secret_output_dir }}/{{ eigenstate_k8s_secret_basename }}.secret.yaml"
    mode: "0600"
  no_log: "{{ eigenstate_k8s_secret_no_log }}"
  when: >-
    (eigenstate_k8s_secret_write_payload_manifest | bool) or
    (eigenstate_k8s_secret_apply | bool)
