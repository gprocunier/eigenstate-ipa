---
name: Integration Tests

on:
  push:
    branches:
      - main
      - 'integration/**'
    paths:
      - 'plugins/**'
      - 'tests/**'
      - '.github/workflows/integration.yml'
  pull_request:
    paths:
      - 'plugins/**'
      - 'tests/**'
      - '.github/workflows/integration.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start FreeIPA server
        run: |
          docker run -d --name ipa-server \
            -h ipa.test.lan \
            --privileged \
            --tmpfs /run --tmpfs /tmp \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            -e IPA_SERVER_INSTALL_OPTS="-U \
              --realm=TEST.LAN --domain=test.lan \
              --ds-password=DirManager123 --admin-password=AdminPass123 \
              --no-ntp --setup-dns --no-forwarders --no-reverse \
              --setup-kra --no-host-dns" \
            quay.io/freeipa/freeipa-server:fedora-43

      - name: Wait for FreeIPA readiness
        run: |
          echo "Waiting for FreeIPA server to be ready..."
          for i in $(seq 1 90); do
            if docker exec ipa-server \
              bash -c 'echo AdminPass123 | kinit admin 2>/dev/null && ipa ping 2>/dev/null'; then
              echo "FreeIPA ready after ~$((i * 10)) seconds"
              docker exec ipa-server kdestroy 2>/dev/null || true
              exit 0
            fi
            if ! docker inspect ipa-server --format '{{.State.Running}}' 2>/dev/null | grep -q true; then
              echo "Container died — dumping logs:"
              docker logs ipa-server 2>&1 | tail -80
              exit 1
            fi
            echo "  attempt $i/90 — not ready yet"
            sleep 10
          done
          echo "FreeIPA did not become ready in time"
          docker logs ipa-server | tail -80
          exit 1

      - name: Install Ansible and collection inside container
        run: |
          docker exec ipa-server \
            bash -c 'echo "nameserver 8.8.8.8" >> /etc/resolv.conf'
          docker exec ipa-server \
            dnf install -y --setopt=install_weak_deps=False python3-pip openssl
          docker exec ipa-server \
            pip install --break-system-packages "ansible-core~=2.18.0"
          docker cp . ipa-server:/root/eigenstate-ipa
          docker exec ipa-server \
            ansible-galaxy collection install /root/eigenstate-ipa --force

      - name: Seed test data
        run: |
          docker exec ipa-server \
            ansible-playbook /root/eigenstate-ipa/tests/integration/seed.yml \
              -e ipa_server=ipa.test.lan \
              -e ipa_password=AdminPass123 \
              -e ipa_ca_cert=/etc/ipa/ca.crt

      - name: Run integration tests
        run: |
          docker exec ipa-server \
            ansible-playbook /root/eigenstate-ipa/tests/integration/test.yml \
              -e ipa_server=ipa.test.lan \
              -e ipa_password=AdminPass123 \
              -e ipa_ca_cert=/etc/ipa/ca.crt

      - name: Cleanup
        if: always()
        run: |
          docker exec ipa-server \
            ansible-playbook /root/eigenstate-ipa/tests/integration/cleanup.yml \
              -e ipa_server=ipa.test.lan \
              -e ipa_password=AdminPass123 \
              -e ipa_ca_cert=/etc/ipa/ca.crt || true
          docker stop ipa-server 2>/dev/null || true
          docker rm ipa-server 2>/dev/null || true
