---
name: Integration Tests

on:
  push:
    branches:
      - main
      - 'integration/**'
    paths:
      - 'plugins/**'
      - 'tests/**'
      - '.github/workflows/integration.yml'
  pull_request:
    paths:
      - 'plugins/**'
      - 'tests/**'
      - '.github/workflows/integration.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download ansible-core wheels and pip bootstrap
        run: |
          pip download pip setuptools wheel -d /tmp/ansible-wheels
          pip download "ansible-core~=2.18.0" -d /tmp/ansible-wheels \
            --no-deps
          pip download resolvelib packaging -d /tmp/ansible-wheels \
            --no-deps
          curl -sSL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py

      - name: Start FreeIPA server
        run: |
          docker run -d --name ipa-server \
            -h ipa.test.lan \
            --privileged \
            --tmpfs /run --tmpfs /tmp \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            -e IPA_SERVER_INSTALL_OPTS="-U \
              --realm=TEST.LAN --domain=test.lan \
              --ds-password=DirManager123 --admin-password=AdminPass123 \
              --no-ntp --setup-dns --no-forwarders --no-reverse \
              --setup-kra --no-host-dns" \
            quay.io/freeipa/freeipa-server:fedora-42

      - name: Wait for FreeIPA readiness
        run: |
          echo "Waiting for FreeIPA server to be ready..."
          for i in $(seq 1 90); do
            if docker exec ipa-server \
              bash -c 'echo AdminPass123 | kinit admin 2>/dev/null && ipa ping 2>/dev/null'; then
              echo "FreeIPA ready after ~$((i * 10)) seconds"
              docker exec ipa-server kdestroy 2>/dev/null || true
              exit 0
            fi
            if ! docker inspect ipa-server --format '{{.State.Running}}' 2>/dev/null | grep -q true; then
              echo "Container died — dumping logs:"
              docker logs ipa-server 2>&1 | tail -80
              exit 1
            fi
            echo "  attempt $i/90 — not ready yet"
            sleep 10
          done
          echo "FreeIPA did not become ready in time"
          docker logs ipa-server | tail -80
          exit 1

      - name: Install Ansible inside container
        run: |
          docker exec ipa-server mkdir -p /root/ci-staging
          docker cp /tmp/get-pip.py ipa-server:/root/ci-staging/get-pip.py
          docker cp /tmp/ansible-wheels ipa-server:/root/ci-staging/wheels
          docker exec ipa-server \
            python3 /root/ci-staging/get-pip.py --break-system-packages \
              --no-index --find-links /root/ci-staging/wheels
          docker exec ipa-server \
            python3 -m pip install --break-system-packages --no-index \
              --find-links /root/ci-staging/wheels \
              --no-deps resolvelib packaging
          docker exec ipa-server \
            python3 -m pip install --break-system-packages --no-index \
              --find-links /root/ci-staging/wheels \
              --no-deps ansible-core

      - name: Install collection inside container
        run: |
          COLL_PATH=/usr/share/ansible/collections/ansible_collections/eigenstate/ipa
          docker exec ipa-server mkdir -p "$COLL_PATH"
          docker cp plugins ipa-server:"$COLL_PATH/plugins"
          docker cp galaxy.yml ipa-server:"$COLL_PATH/galaxy.yml"
          docker cp meta ipa-server:"$COLL_PATH/meta"
          docker cp tests/integration ipa-server:/root/integration-tests

      - name: Seed test data
        run: |
          docker exec ipa-server \
            ansible-playbook /root/integration-tests/seed.yml \
              -e ipa_server=ipa.test.lan \
              -e ipa_password=AdminPass123 \
              -e ipa_ca_cert=/etc/ipa/ca.crt

      - name: Run integration tests
        run: |
          docker exec ipa-server \
            ansible-playbook /root/integration-tests/test.yml \
              -e ipa_server=ipa.test.lan \
              -e ipa_password=AdminPass123 \
              -e ipa_ca_cert=/etc/ipa/ca.crt

      - name: Cleanup
        if: always()
        run: |
          docker exec ipa-server \
            ansible-playbook /root/integration-tests/cleanup.yml \
              -e ipa_server=ipa.test.lan \
              -e ipa_password=AdminPass123 \
              -e ipa_ca_cert=/etc/ipa/ca.crt || true
          docker stop ipa-server 2>/dev/null || true
          docker rm ipa-server 2>/dev/null || true
