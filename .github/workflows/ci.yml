---
name: Validate Collection

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate ansible-core ${{ matrix.ansible-core }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        ansible-core:
          - '2.15'
          - '2.16'
          - '2.17'
          - '2.18'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "ansible-core~=${{ matrix.ansible-core }}.0" \
            PyYAML==6.0.2 yamllint ansible-lint

      - name: Run collection validation
        env:
          EIGENSTATE_REQUIRE_ANSIBLE_TEST: '1'
          EIGENSTATE_ANSIBLE_TEST_PYTHON: '3.11'
        run: ./scripts/validate-collection.sh
