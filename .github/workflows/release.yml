---
name: Release Collection

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: validate ansible-core ${{ matrix.ansible-core }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        ansible-core:
          - '2.15'
          - '2.16'
          - '2.17'
          - '2.18'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "ansible-core~=${{ matrix.ansible-core }}.0" \
            PyYAML==6.0.2 yamllint ansible-lint

      - name: Run collection validation
        env:
          EIGENSTATE_REQUIRE_ANSIBLE_TEST: '1'
          EIGENSTATE_ANSIBLE_TEST_PYTHON: '3.11'
        run: ./scripts/validate-collection.sh

  release:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ansible-core~=2.18.0" PyYAML==6.0.2 yamllint ansible-lint

      - name: Check release tag and collection version
        run: |
          version="$(python - <<'PY'
          import yaml
          with open("galaxy.yml", encoding="utf-8") as handle:
              print(yaml.safe_load(handle)["version"])
          PY
          )"
          tag="${GITHUB_REF_NAME}"
          if [[ "${tag}" != "v${version}" ]]; then
            echo "Tag ${tag} does not match galaxy.yml version ${version}" >&2
            exit 1
          fi

      - name: Build collection artifact
        run: |
          mkdir -p dist
          artifact="$(
            ansible-galaxy collection build . --output-path dist \
              | awk '/Created collection/{print $NF}'
          )"
          if [[ -z "${artifact}" || ! -f "${artifact}" ]]; then
            echo "Collection artifact was not created" >&2
            exit 1
          fi
          sha256sum "${artifact}" | tee dist/SHA256SUMS
          python - "${artifact}" <<'PY'
          import sys
          import tarfile

          artifact = sys.argv[1]
          with tarfile.open(artifact, "r:gz") as archive:
              names = set(archive.getnames())
          required = {"MANIFEST.json", "FILES.json", "meta/runtime.yml"}
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"release artifact missing required files: {missing}")
          PY
          install_root="$(mktemp -d)"
          ansible-galaxy collection install "${artifact}" -p "${install_root}"
          ANSIBLE_COLLECTIONS_PATH="${install_root}" \
            ansible-doc -t lookup eigenstate.ipa.vault >/dev/null
          ANSIBLE_COLLECTIONS_PATH="${install_root}" \
            ansible-doc -t module eigenstate.ipa.user_lease >/dev/null

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
