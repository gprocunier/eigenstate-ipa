---
namespace: "eigenstate"
name: "ipa"
version: "1.3.0"
description: >-
  An Ansible collection for Red Hat IdM / FreeIPA with dynamic
  inventory plus lookup plugins for IdM vault retrieval, Kerberos
  principal state, Kerberos keytab retrieval, and certificate
  issuance for Kerberos-friendly automation, AAP, and secure secret
  delivery.

authors:
  - "Greg Procunier"

repository: "https://github.com/gprocunier/eigenstate-ipa"
documentation: "https://gprocunier.github.io/eigenstate-ipa/"
homepage: "https://gprocunier.github.io/eigenstate-ipa/"
issues: "https://github.com/gprocunier/eigenstate-ipa/issues"

readme: "README.md"

license:
  - "GPL-3.0-or-later"

tags:
  - "linux"
  - "identity"
  - "ipa"
  - "freeipa"
  - "idm"
  - "inventory"
  - "vault"
  - "principal"
  - "cert"
  - "secrets"
  - "keytab"
  - "kerberos"
  - "rhel"

build_ignore:
  - "*.tar.gz"
  - ".git"
  - ".ansible"
  - ".ansible"
